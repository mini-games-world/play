<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하늘을 나는 토끼 점프</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #333; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        /* 캔버스와 버튼을 묶는 컨테이너 */
        #gameContainer {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
        }
        canvas { 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            display: block;
            -webkit-tap-highlight-color: transparent;
        }
        /* 모바일 좌우 버튼 스타일 */
        #mobileControls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none; /* 컨테이너 자체는 터치 무시 */
        }
        .dir-btn {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            font-size: 30px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* 버튼은 터치 가능 */
            touch-action: none; /* 브라우저 기본 스크롤/확대 방지 */
            cursor: pointer;
        }
        .dir-btn:active {
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="mobileControls">
        <div id="btnLeft" class="dir-btn">◀</div>
        <div id="btnRight" class="dir-btn">▶</div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- [사운드 설정] ---
    const BGM_URL = "rabbit_bgm.mp3"; 
    const bgm = new Audio(BGM_URL);
    bgm.loop = true;
    bgm.volume = 0.3;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playEffect(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'jump') { // 또잉!
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 0.15);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } 
        else if (type === 'hit') { // 퍽!
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } 
        else if (type === 'gameover') { // 띠로리~
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        }
    }

    // 오디오 정책 잠금 해제용 함수 (최초 터치 시 실행)
    function unlockAudio() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (bgm.paused) bgm.play().catch(() => {});
    }

    // --- 게임 설정 값 ---
    const GRAVITY = 0.45;      
    const JUMP_STR = -10.5;    
    const SPRING_BOOST = -22;  
    const PLAYER_SPEED = 5.5;
    const MAX_HP = 3;
    const MONSTER_DAMAGE = 1;
    const INVINCIBLE_TIME = 1000;

    let player, platforms, monsters, springs, clouds, score, gameOver, keys, isInvincible, invincibleTimer, gameOverReason;
    let isCounting, countNum, countMsg;

    function initGame() {
        window.parent.postMessage({ type: 'GAME_ACTUAL_START' }, '*');

        player = { x: canvas.width / 2 - 15, y: canvas.height - 150, width: 30, height: 30, dy: 0, hp: MAX_HP };
        platforms = []; monsters = []; springs = []; clouds = [];
        score = 0; gameOver = false; isInvincible = false;
        keys = { right: false, left: false };
        gameOverReason = "";

        // 카운트다운 설정
        isCounting = true;
        countNum = 3;
        countMsg = "하늘 높이 올라가보세요!";

        const timer = setInterval(() => {
            countNum--;
            if (countNum <= 0) {
                isCounting = false;
                clearInterval(timer);
            }
        }, 1000);

        platforms.push({ x: canvas.width / 2 - 35, y: canvas.height - 30, width: 70, height: 15, type: 'normal', dx: 0 });
        for (let i = 1; i < 9; i++) spawnPlatform(canvas.height - i * 70);
        for (let i = 0; i < 5; i++) spawnCloud(Math.random() * canvas.height);
    }

    function spawnCloud(y) { clouds.push({ x: Math.random() * canvas.width, y: y, size: Math.random() * 20 + 30 }); }

    function spawnPlatform(y) {
        let typeRand = Math.random();
        let type = 'normal';
        let dx = 0;

        if (score > 50 && typeRand < 0.2) type = 'broken'; 
        else if (score > 150 && typeRand < 0.4) dx = (Math.random() > 0.5 ? 1 : -1) * 1.5; 

        let platWidth = Math.max(40, 70 - (score / 100)); 
        let platX = Math.random() * (canvas.width - platWidth);
        
        let platform = { x: platX, y: y, width: platWidth, height: 15, type: type, dx: dx };
        platforms.push(platform);

        if (type === 'normal') {
            let itemRand = Math.random();
            if (itemRand < 0.1) {
                springs.push({ x: platX + platWidth/2 - 12, y: y - 25, width: 25, height: 25, alive: true });
            } else if (score > 50 && itemRand < 0.35) {
                monsters.push({ 
                    x: platX, y: y - 30, width: 30, height: 30, 
                    dx: (Math.random() > 0.5 ? 1 : -1) * (1.5 + score/2000), alive: true 
                });
            }
        }
    }

    function takeDamage() {
        if (isInvincible || gameOver) return;
        player.hp -= MONSTER_DAMAGE;
        playEffect('hit'); // [수정] 피격 효과음
        
        if (player.hp <= 0) {
            triggerGameOver("독수리의 밥이 되었습니다!");
        } else {
            isInvincible = true;
            clearTimeout(invincibleTimer);
            invincibleTimer = setTimeout(() => isInvincible = false, INVINCIBLE_TIME);
        }
    }

    function triggerGameOver(reason) {
        if(gameOver) return;
        gameOver = true;
        gameOverReason = reason;
        player.dy = 12; 
        
        bgm.pause(); // [수정] bgm 정지
        bgm.currentTime = 0;
        playEffect('gameover'); // [수정] 게임오버 효과음

        keys.left = false; keys.right = false; 
        window.parent.postMessage({ type: 'GAME_OVER', score: Math.floor(score) }, '*');
    }

    function rectIntersect(r1, r2) {
        let margin = 5; 
        return !(r2.x > r1.x + r1.width - margin || r2.x + r2.width < r1.x + margin || r2.y > r1.y + r1.height - margin || r2.y + r2.height < r1.y + margin);
    }

    function update() {
        if (isCounting) { draw(); requestAnimationFrame(update); return; }
        
        if (gameOver) {
            player.y += player.dy;
            draw();
            if (player.y < canvas.height + 100) requestAnimationFrame(update);
            return;
        }

        if (keys.right) player.x += PLAYER_SPEED;
        if (keys.left) player.x -= PLAYER_SPEED;
        
        if (player.x > canvas.width) player.x = -player.width;
        if (player.x + player.width < 0) player.x = canvas.width;

        player.dy += GRAVITY;
        player.y += player.dy;

        platforms.forEach(p => {
            if (p.dx !== 0) {
                p.x += p.dx;
                if (p.x <= 0 || p.x + p.width >= canvas.width) p.dx *= -1;
            }
        });

        monsters.forEach(m => {
            if (!m.alive) return;
            m.x += m.dx;
            if (m.x <= 0 || m.x + m.width >= canvas.width) m.dx *= -1;

            if (rectIntersect(player, m)) {
                if (player.dy > 0 && player.y + player.height < m.y + m.height/2 + 10) {
                    m.alive = false;
                    player.dy = JUMP_STR; 
                    playEffect('jump'); // [수정] 몬스터 밟을 때 소리
                    score += 150;
                } else {
                    takeDamage();
                }
            }
        });

        if (player.dy > 0) {
            springs.forEach(s => {
                if (s.alive && rectIntersect(player, s)) {
                    player.dy = SPRING_BOOST; 
                    playEffect('jump'); // [수정] 스프링 탈 때 소리
                    score += 50;
                }
            });

            platforms.forEach((p, index) => {
                if (player.x + player.width > p.x && player.x < p.x + p.width && 
                    player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                    
                    player.dy = JUMP_STR;
                    playEffect('jump'); // [수정] 일반 발판 밟을 때 소리
                    if (p.type === 'broken') platforms.splice(index, 1);
                }
            });
        }

        if (player.y < canvas.height / 2.5) {
            let offset = (canvas.height / 2.5) - player.y;
            player.y = canvas.height / 2.5;
            score += Math.floor(offset / 5); 

            platforms.forEach(p => p.y += offset);
            monsters.forEach(m => m.y += offset);
            springs.forEach(s => s.y += offset);
            clouds.forEach(c => {
                c.y += offset * 0.3; 
                if(c.y > canvas.height) { c.y = -50; c.x = Math.random() * canvas.width; }
            });
        }

        platforms = platforms.filter(p => p.y < canvas.height);
        monsters = monsters.filter(m => m.y < canvas.height && m.alive);
        springs = springs.filter(s => s.y < canvas.height);

        while (platforms.length < 9) {
            let lowestY = canvas.height;
            platforms.forEach(p => { if(p.y < lowestY) lowestY = p.y; });
            spawnPlatform(lowestY - 70);
        }

        if (player.y > canvas.height + player.height) triggerGameOver("추락했습니다!");

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.textBaseline = "top";

        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        clouds.forEach(c => { ctx.font = `${c.size}px Arial`; ctx.fillText("☁️", c.x, c.y); });

        platforms.forEach(p => {
            if (p.type === 'broken') {
                ctx.fillStyle = "#A0522D"; ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#8B4513"; ctx.fillRect(p.x, p.y + p.height/2, p.width, 2); 
            } else {
                ctx.fillStyle = "#8BC34A"; ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#689F38"; ctx.fillRect(p.x, p.y, p.width, 5); 
            }
        });

        springs.forEach(s => { if(s.alive) { ctx.font = "25px Arial"; ctx.fillText("🍄", s.x, s.y); } });
        monsters.forEach(m => { if(m.alive) { ctx.font = "30px Arial"; ctx.fillText("🦅", m.x, m.y); } });

        if (!isInvincible || Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.font = "30px Arial"; ctx.fillText("🐰", player.x, player.y);
        }

        ctx.fillStyle = "#333";
        ctx.font = "bold 22px 'Comic Sans MS', cursive, sans-serif";
        ctx.fillText(`Score: ${score}`, 15, 15);
        for (let i = 0; i < MAX_HP; i++) {
            ctx.font = "20px Arial";
            ctx.fillText(i < player.hp ? "🥕" : "⚪", canvas.width - 35 - (i * 25), 15);
        }

        if (isCounting) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial";
            ctx.fillText(countMsg, canvas.width / 2, 250);
            ctx.font = "bold 80px Arial"; ctx.fillStyle = "#FFC107";
            ctx.fillText(countNum, canvas.width / 2, 330);
            ctx.textAlign = "left";
        }

        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 40px 'Comic Sans MS', cursive, sans-serif";
            ctx.fillText("GAME OVER", canvas.width / 2, 230);
            ctx.fillStyle = "#FFC107"; ctx.font = "bold 20px Arial";
            ctx.fillText(gameOverReason, canvas.width / 2, 280);
            ctx.fillStyle = "#fff"; ctx.font = "bold 25px Arial";
            ctx.fillText(`최종 점수: ${score}`, canvas.width / 2, 330);
            ctx.font = "18px Arial";
            ctx.fillText("🐰 [화면을 터치]하여 재도전 🐰", canvas.width / 2, 390);
            ctx.textAlign = "left"; 
        }
    }

    // --- 이벤트 리스너 (키보드 & UI 버튼 & 화면 터치) ---

    // 1. PC 키보드
    document.addEventListener("keydown", (e) => {
        unlockAudio();
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "Space" && gameOver) { initGame(); update(); }
    });
    document.addEventListener("keyup", (e) => {
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "ArrowLeft") keys.left = false;
    });

    // 2. 화면 터치 (게임 오버 재시작 및 오디오 잠금 해제용)
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        unlockAudio();
        if (gameOver) { initGame(); update(); }
    }, { passive: false });
    
    // PC에서 마우스 클릭 지원
    canvas.addEventListener("mousedown", () => {
        unlockAudio();
        if (gameOver) { initGame(); update(); }
    });

    // 3. 모바일 UI 버튼 조작
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    function setupButton(btn, keyName) {
        btn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            unlockAudio();
            if (!isCounting && !gameOver) keys[keyName] = true;
        }, { passive: false });
        
        btn.addEventListener("touchend", (e) => {
            e.preventDefault();
            keys[keyName] = false;
        }, { passive: false });

        // PC 마우스 테스트용
        btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            unlockAudio();
            if (!isCounting && !gameOver) keys[keyName] = true;
        });
        btn.addEventListener("mouseup", (e) => { e.preventDefault(); keys[keyName] = false; });
        btn.addEventListener("mouseleave", (e) => { e.preventDefault(); keys[keyName] = false; });
    }

    setupButton(btnLeft, "left");
    setupButton(btnRight, "right");

    // 게임 시작
    initGame();
    update();
</script>
</body>
</html>
