<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하늘을 나는 토끼 점프 (모바일 버전)</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #333; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            /* 모바일에서 텍스트 선택 방지 */
            user-select: none; 
            -webkit-user-select: none;
        }
        /* 모바일 화면 비율에 맞춰 캔버스 크기 자동 조절 */
        canvas { 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            max-width: 100%; 
            max-height: 100vh;
            /* 모바일에서 터치했을 때 파란색 하이라이트 박스 생기는 것 방지 */
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 초반 긴장감을 높인 게임 설정 값 ---
    const GRAVITY = 0.45;      
    const JUMP_STR = -10.5;    
    const SPRING_BOOST = -22;  
    const PLAYER_SPEED = 5.5;
    const MAX_HP = 3;
    const MONSTER_DAMAGE = 1;
    const INVINCIBLE_TIME = 1000;

    // --- 게임 상태 변수 ---
    let player, platforms, monsters, springs, clouds, score, gameOver, keys, isInvincible, invincibleTimer, gameOverReason;

    function initGame() {
	// [보정] 게임 시작 신호를 함수 시작 시점에 즉시 전송
        window.parent.postMessage({ type: 'GAME_ACTUAL_START' }, '*');

        player = { x: canvas.width / 2 - 15, y: canvas.height - 150, width: 30, height: 30, dy: 0, hp: MAX_HP };
        platforms = []; monsters = []; springs = []; clouds = [];
        score = 0; gameOver = false; isInvincible = false;
        keys = { right: false, left: false };
        gameOverReason = "";

	// --- 아래 내용을 복사해서 넣어주세요 ---
window.parent.postMessage({ type: 'GAME_ACTUAL_START' }, '*');

        // 시작 발판
        platforms.push({ x: canvas.width / 2 - 35, y: canvas.height - 30, width: 70, height: 15, type: 'normal', dx: 0 });

        // 초기 발판 및 배경 구름 생성
        for (let i = 1; i < 9; i++) spawnPlatform(canvas.height - i * 70);
        for (let i = 0; i < 5; i++) spawnCloud(Math.random() * canvas.height);
    }

    function spawnCloud(y) {
        clouds.push({ x: Math.random() * canvas.width, y: y, size: Math.random() * 20 + 30 });
    }

    function spawnPlatform(y) {
        let typeRand = Math.random();
        let type = 'normal';
        let dx = 0;

        if (score > 50 && typeRand < 0.2) type = 'broken'; 
        else if (score > 150 && typeRand < 0.4) dx = (Math.random() > 0.5 ? 1 : -1) * 1.5; 

        let platWidth = Math.max(40, 70 - (score / 100)); 
        let platX = Math.random() * (canvas.width - platWidth);
        
        let platform = { x: platX, y: y, width: platWidth, height: 15, type: type, dx: dx };
        platforms.push(platform);

        if (type === 'normal') {
            let itemRand = Math.random();
            if (itemRand < 0.1) {
                springs.push({ x: platX + platWidth/2 - 12, y: y - 25, width: 25, height: 25, alive: true });
            } else if (score > 50 && itemRand < 0.35) {
                monsters.push({ 
                    x: platX, y: y - 30, width: 30, height: 30, 
                    dx: (Math.random() > 0.5 ? 1 : -1) * (1.5 + score/2000), 
                    alive: true 
                });
            }
        }
    }

    // ⭐ PC용 키보드 이벤트 (테스트용 유지)
    document.addEventListener("keydown", (e) => {
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "Space" && gameOver) { initGame(); update(); }
    });
    document.addEventListener("keyup", (e) => {
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "ArrowLeft") keys.left = false;
    });

    // ⭐ 모바일용 터치 이벤트 추가
    canvas.addEventListener("touchstart", handleTouch, { passive: false });
    canvas.addEventListener("touchmove", handleTouch, { passive: false });
    canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        keys.left = false;
        keys.right = false;
    }, { passive: false });

    function handleTouch(e) {
        e.preventDefault(); // 스크롤 방지
        
        if (gameOver) {
            initGame();
            update();
            return;
        }

        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        // 캔버스 내 터치 위치 계산 (화면 렌더링 크기에 비례하여 맞춤)
        const scaleX = canvas.width / rect.width;
        const touchX = (touch.clientX - rect.left) * scaleX;

        // 화면 왼쪽 절반을 터치하면 왼쪽, 오른쪽이면 오른쪽으로 이동
        if (touchX < canvas.width / 2) {
            keys.left = true;
            keys.right = false;
        } else {
            keys.right = true;
            keys.left = false;
        }
    }

    // 충돌 감지
    function rectIntersect(r1, r2) {
        let margin = 5; 
        return !(r2.x > r1.x + r1.width - margin || 
                 r2.x + r2.width < r1.x + margin || 
                 r2.y > r1.y + r1.height - margin || 
                 r2.y + r2.height < r1.y + margin);
    }

    function takeDamage() {
        if (isInvincible || gameOver) return;
        player.hp -= MONSTER_DAMAGE;
        if (player.hp <= 0) {
            triggerGameOver("독수리의 밥이 되었습니다!");
        } else {
            isInvincible = true;
            clearTimeout(invincibleTimer);
            invincibleTimer = setTimeout(() => isInvincible = false, INVINCIBLE_TIME);
        }
    }

    function triggerGameOver(reason) {
        if(gameOver) return;
        gameOver = true;
        gameOverReason = reason;
        player.dy = 12; 
        keys.left = false; keys.right = false; // 죽으면 이동 멈춤

// 이 줄을 추가하세요!
    window.parent.postMessage({ type: 'GAME_OVER', score: Math.floor(score) }, '*');

    }

    function update() {
        if (gameOver) {
            player.y += player.dy;
            draw();
            if (player.y < canvas.height + 100) requestAnimationFrame(update);
            return;
        }

        // 1. 플레이어 이동
        if (keys.right) player.x += PLAYER_SPEED;
        if (keys.left) player.x -= PLAYER_SPEED;
        if (player.x > canvas.width) player.x = -player.width;
        if (player.x + player.width < 0) player.x = canvas.width;

        player.dy += GRAVITY;
        player.y += player.dy;

        // 2. 발판 움직임
        platforms.forEach(p => {
            if (p.dx !== 0) {
                p.x += p.dx;
                if (p.x <= 0 || p.x + p.width >= canvas.width) p.dx *= -1;
            }
        });

        // 3. 몬스터(독수리) 이동 및 충돌
        monsters.forEach(m => {
            if (!m.alive) return;
            m.x += m.dx;
            if (m.x <= 0 || m.x + m.width >= canvas.width) m.dx *= -1;

            if (rectIntersect(player, m)) {
                if (player.dy > 0 && player.y + player.height < m.y + m.height/2 + 10) {
                    m.alive = false;
                    player.dy = JUMP_STR; // 독수리 밟고 점프
                    score += 150;
                } else {
                    takeDamage();
                }
            }
        });

        // 4. 버섯(스프링) 충돌
        if (player.dy > 0) {
            springs.forEach(s => {
                if (s.alive && rectIntersect(player, s)) {
                    player.dy = SPRING_BOOST; 
                    score += 50;
                }
            });
        }

        // 5. 발판 충돌
        if (player.dy > 0) {
            platforms.forEach((p, index) => {
                if (player.x + player.width > p.x && player.x < p.x + p.width && 
                    player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                    
                    player.dy = JUMP_STR;
                    if (p.type === 'broken') platforms.splice(index, 1);
                }
            });
        }

        // 6. 스크롤 및 점수 획득
        if (player.y < canvas.height / 2.5) {
            let offset = (canvas.height / 2.5) - player.y;
            player.y = canvas.height / 2.5;
            score += Math.floor(offset / 5); 

            platforms.forEach(p => p.y += offset);
            monsters.forEach(m => m.y += offset);
            springs.forEach(s => s.y += offset);
            clouds.forEach(c => {
                c.y += offset * 0.3; 
                if(c.y > canvas.height) {
                    c.y = -50;
                    c.x = Math.random() * canvas.width;
                }
            });
        }

        // 7. 화면 밖 객체 정리 및 스폰
        platforms = platforms.filter(p => p.y < canvas.height);
        monsters = monsters.filter(m => m.y < canvas.height && m.alive);
        springs = springs.filter(s => s.y < canvas.height);

        while (platforms.length < 9) {
            let lowestY = canvas.height;
            platforms.forEach(p => { if(p.y < lowestY) lowestY = p.y; });
            spawnPlatform(lowestY - 70);
        }

        if (player.y > canvas.height + player.height) triggerGameOver("추락했습니다!");

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.textBaseline = "top";

        // 배경 구름
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        clouds.forEach(c => {
            ctx.font = `${c.size}px Arial`;
            ctx.fillText("☁️", c.x, c.y);
        });

        // 발판
        platforms.forEach(p => {
            if (p.type === 'broken') {
                ctx.fillStyle = "#A0522D"; 
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#8B4513";
                ctx.fillRect(p.x, p.y + p.height/2, p.width, 2); 
            } else {
                ctx.fillStyle = "#8BC34A"; 
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#689F38"; 
                ctx.fillRect(p.x, p.y, p.width, 5); 
            }
        });

        // 버섯(스프링)
        springs.forEach(s => {
            if(s.alive) {
                ctx.font = "25px Arial";
                ctx.fillText("🍄", s.x, s.y);
            }
        });

        // 몬스터(독수리)
        monsters.forEach(m => {
            if(m.alive) {
                ctx.font = "30px Arial";
                ctx.fillText("🦅", m.x, m.y);
            }
        });

        // 플레이어(토끼)
        if (!isInvincible || Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.font = "30px Arial";
            ctx.fillText("🐰", player.x, player.y);
        }

        // UI
        ctx.fillStyle = "#333";
        ctx.font = "bold 22px 'Comic Sans MS', cursive, sans-serif";
        ctx.fillText(`Score: ${score}`, 15, 15);

        for (let i = 0; i < MAX_HP; i++) {
            ctx.font = "20px Arial";
            ctx.fillText(i < player.hp ? "🥕" : "⚪", canvas.width - 35 - (i * 25), 15);
        }

        // 게임 오버
        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.font = "bold 40px 'Comic Sans MS', cursive, sans-serif";
            ctx.fillText("GAME OVER", canvas.width / 2, 230);
            
            ctx.fillStyle = "#FFC107";
            ctx.font = "bold 20px Arial";
            ctx.fillText(gameOverReason, canvas.width / 2, 280);

            ctx.fillStyle = "#fff";
            ctx.font = "bold 25px Arial";
            ctx.fillText(`최종 점수: ${score}`, canvas.width / 2, 330);
            
            ctx.font = "18px Arial";
            // 모바일에 맞게 문구 변경
            ctx.fillText("🐰 [화면을 터치]하여 재도전 🐰", canvas.width / 2, 390);
            ctx.textAlign = "left"; 
        }
    }

    initGame();
    update();
</script>

</body>
</html>
