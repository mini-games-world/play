<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마그네틱 커넥터: 비주얼 업그레이드</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a12; --danger: #ff4757; --gold: #f1c40f; --ready: #bc4dff; }
        body { margin: 0; background: var(--bg); overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .energy-bar { width: 250px; height: 14px; background: #222; margin: 10px auto; border-radius: 7px; border: 1px solid #444; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: width 0.1s; }
        #level-display { font-size: 24px; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { background: var(--neon); color: #000; padding: 15px 40px; font-size: 20px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="level-display">STAGE <span id="lvl-val">1</span></div>
        <div id="status" style="font-size:16px;">코어 수집: <span id="score">0</span> / 3</div>
        <div class="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="fail-ui" class="overlay">
        <h1 style="color:var(--danger)">ENERGY DEPLETED</h1>
        <p>최종 스테이지: <span id="final-lvl" style="color:var(--gold)">1</span></p>
        <button class="btn" onclick="resetGame()">다시 도전</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = true;
    let isDrawing = false;
    let currentPath = [];
    let energy = 100;
    let score = 0;
    let level = 1;
    let tick = 0; // 애니메이션용 프레임 카운터

    let startNode, endNode, cores, obstacles;

    function initLevel(lvl) {
        score = 0;
        energy = 100;
        currentPath = [];
        document.getElementById('lvl-val').innerText = lvl;
        document.getElementById('score').innerText = 0;

        startNode = { x: 80, y: canvas.height / 2, r: 35 };
        endNode = { x: canvas.width - 80, y: canvas.height / 2, r: 50 };

        cores = [];
        for(let i=0; i<3; i++) {
            cores.push({
                x: canvas.width * (0.25 + i * 0.25),
                y: 150 + Math.random() * (canvas.height - 300),
                collected: false
            });
        }

        obstacles = [];
        if (lvl >= 3) {
            let count = Math.min(6, lvl - 2);
            for(let i=0; i<count; i++) {
                obstacles.push({ x: canvas.width * 0.3 + Math.random() * (canvas.width * 0.4), y: 100 + Math.random() * (canvas.height - 200), r: 20 + Math.random() * 15 });
            }
        }
    }

    function update() {
        if (!gameActive) return;
        tick++;
        document.getElementById('energy-fill').style.width = Math.max(0, energy) + "%";
        if (energy <= 0 && isDrawing) { isDrawing = false; endGame(); }
    }

    function draw() {
        ctx.fillStyle = "#0a0a12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- 시작점 (S) ---
        drawCircle(startNode.x, startNode.y, startNode.r, "#fff", "S", false);

        // --- [핵심!] 도착점 (E) 강화 ---
        const isReady = score >= 3;
        const pulse = Math.sin(tick * 0.1) * 5; // 두근거리는 효과
        const eColor = isReady ? "#00f2ff" : "#bc4dff"; // 준비되면 하늘색, 아니면 보라색
        
        ctx.save();
        ctx.shadowBlur = isReady ? 30 : 15;
        ctx.shadowColor = eColor;
        drawCircle(endNode.x, endNode.y, endNode.r + pulse, eColor, "E", true);
        ctx.restore();

        // 장애물
        obstacles.forEach(obs => {
            ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255, 71, 87, 0.3)"; ctx.fill();
            ctx.strokeStyle = "#ff4757"; ctx.stroke();
        });

        // 코어
        cores.forEach(c => {
            if (!c.collected) {
                ctx.save();
                ctx.shadowBlur = 10; ctx.shadowColor = "cyan";
                ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("💎", c.x, c.y);
                ctx.restore();
            }
        });

        // 선
        if (currentPath.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 6; ctx.lineCap = "round";
            ctx.moveTo(currentPath[0].x, currentPath[0].y);
            currentPath.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }

        if (gameActive) requestAnimationFrame(() => { update(); draw(); });
    }

    function drawCircle(x, y, r, color, txt, isExit) {
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.strokeStyle = color; ctx.lineWidth = isExit ? 5 : 3; ctx.stroke();
        
        // 원 내부 은은한 채우기
        ctx.fillStyle = isExit ? "rgba(188, 77, 255, 0.1)" : "transparent";
        if (score >= 3 && isExit) ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
        ctx.fill();

        ctx.fillStyle = color; ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
        ctx.fillText(txt, x, y + 8);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('final-lvl').innerText = level;
        document.getElementById('fail-ui').style.display = 'flex';
    }

    function resetGame() {
        level = 1; gameActive = true;
        document.getElementById('fail-ui').style.display = 'none';
        initLevel(level); draw();
    }

    const getPos = e => ({ x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY });

    canvas.addEventListener('mousedown', e => {
        if (!gameActive) return;
        const pos = getPos(e);
        if (Math.hypot(pos.x - startNode.x, pos.y - startNode.y) < 50) {
            isDrawing = true; currentPath = [pos]; energy = 100; score = 0;
            cores.forEach(c => c.collected = false);
        }
    });

    window.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        const pos = getPos(e);
        const last = currentPath[currentPath.length - 1];
        const d = Math.hypot(pos.x - last.x, pos.y - last.y);

        if (d > 5) {
            currentPath.push(pos);
            let costFactor = 0.04 + (level * 0.015); // [조정] 레벨 1 난이도 하향
            energy -= d * costFactor;

            obstacles.forEach(obs => {
                if (Math.hypot(pos.x - obs.x, pos.y - obs.y) < obs.r) { isDrawing = false; endGame(); }
            });

            cores.forEach(c => {
                let collectR = 70 - Math.min(30, level * 2); // [조정] 수집 범위 상향
                if (!c.collected && Math.hypot(pos.x - c.x, pos.y - c.y) < collectR) {
                    c.collected = true; score++;
                    energy = Math.min(100, energy + 20); // [조정] 회복량 상향
                    document.getElementById('score').innerText = score;
                }
            });

            if (score >= 3 && Math.hypot(pos.x - endNode.x, pos.y - endNode.y) < 50) {
                isDrawing = false; level++; initLevel(level);
            }
        }
    });

    window.addEventListener('mouseup', () => { if(isDrawing && gameActive) { isDrawing = false; endGame(); } });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', {clientX: e.touches[0].clientX, clientY: e.touches[0].clientY})); }, {passive: false});
    window.addEventListener('touchmove', e => { e.preventDefault(); window.dispatchEvent(new MouseEvent('mousemove', {clientX: e.touches[0].clientX, clientY: e.touches[0].clientY})); }, {passive: false});
    window.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup')));

    initLevel(level);
    draw();
</script>
</body>
</html>
