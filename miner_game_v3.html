<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>광산 수레 러시(반응속도 측정기)</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100vh; 
            background-color: #1a1a1a; 
            color: #fff; 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            touch-action: none; 
        }
        
        #gameContainer {
            position: relative;
            width: min(96vw, 800px, 90vh); 
            aspect-ratio: 2 / 1; 
            margin: 0 auto;
        }

        canvas { 
            width: 100%; 
            height: 100%;
            display: block;
            background-color: #3e2723; 
            border: 4px solid #5d4037; 
            border-radius: 10px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }

        .overlay {
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px; 
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .overlay h1 {
            font-size: clamp(26px, 6vw, 50px);
            margin-bottom: 10px;
            color: #ffca28;
            text-shadow: 2px 2px 4px #000;
            line-height: 1.2;
        }
        .overlay h1 span {
            font-size: clamp(16px, 4vw, 30px);
        }
        .overlay p {
            font-size: clamp(14px, 3vw, 20px);
            margin-bottom: 2vh;
            color: #ccc;
        }
        button.start-btn {
            padding: 2vh 5vw;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            color: #fff;
            background-color: #d84315;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: background-color 0.2s;
        }
        button.start-btn:hover { background-color: #bf360c; }

        #mobileControls {
            display: flex;
            justify-content: center;
            gap: 6vw; 
            margin-top: 4vh; 
        }
        .controlBtn {
            width: min(80px, 18vw); 
            height: min(80px, 18vw);
            font-size: min(36px, 8vw);
            color: #fff;
            background-color: #795548;
            border: 4px solid #5d4037;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 0 #3e2723;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .controlBtn:active {
            transform: translateY(6px);
            box-shadow: none;
            background-color: #5d4037;
        }
        
        .instructions { 
            margin-top: 3vh; 
            color: #aaa; 
            font-size: clamp(11px, 2.8vw, 14px); 
            line-height: 1.5; 
            padding: 0 10px;
            word-break: keep-all; 
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="startScreen" class="overlay">
            <h1>🚂 광산 수레 러시<br><span style="color: #4fc3f7;">(반응속도 측정기)</span></h1>
            <p>방향키(↑, ↓) 또는 하단 버튼으로 선로를 이동하세요!</p>
            <button id="startBtn" class="start-btn">게임 시작</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1 style="color: #ef5350; font-size: clamp(30px, 8vw, 60px);">GAME OVER</h1>
            <p style="margin-bottom: 10px;">최종 누적 스코어: <strong id="finalScore" style="color: #fff; font-size: clamp(20px, 5vw, 28px);">0</strong> 점</p>
            <div id="playerRank" style="font-size: clamp(20px, 6vw, 36px); font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px #000;"></div>
            <button id="restartBtn" class="start-btn">다시 시작하기</button>
        </div>
    </div>

    <div id="mobileControls">
        <button id="upBtn" class="controlBtn">▲</button>
        <button id="downBtn" class="controlBtn">▼</button>
    </div>

    <div class="instructions">
        <strong>점수:</strong> 💎다이아(+10) 💰황금자루(+3) 🪙동전(+1)<br>
        <strong>아이템:</strong> ⚙️부품(HP +1) 🛡️쉴드(5초 무적) | <strong>위험:</strong> 🧨폭탄(-3) 🐍뱀(-2) 🦇박쥐(-1)
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreText = document.getElementById('finalScore');
        const playerRankText = document.getElementById('playerRank'); 
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');

        // --- 오디오 시스템 ---
        let audioCtx;
        let bgmInterval;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playCoinSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playPowerupSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime); 
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.1); 
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playHurtSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // BGM 멜로디: 웅장한 아르페지오 진행
        const bgmNotes = [
            440.00, 523.25, 659.25, 880.00, 783.99, 659.25, 523.25, 440.00, 
            349.23, 440.00, 523.25, 698.46, 659.25, 523.25, 440.00, 349.23, 
            293.66, 349.23, 440.00, 587.33, 523.25, 440.00, 349.23, 293.66, 
            329.63, 415.30, 493.88, 659.25, 587.33, 493.88, 415.30, 329.63, 
            440.00, 523.25, 659.25, 880.00, 783.99, 659.25, 523.25, 440.00, 
            349.23, 440.00, 523.25, 698.46, 659.25, 523.25, 440.00, 349.23, 
            293.66, 349.23, 440.00, 587.33, 698.46, 659.25, 587.33, 523.25, 
            493.88, 415.30, 329.63, 293.66, 329.63                          
        ]; 
        let noteIdx = 0;
        let isBgmPlaying = false;
        let bgmTimer;

        function playBGM() {
            if (!audioCtx) return;
            if (isBgmPlaying) return; 
            isBgmPlaying = true;
            scheduleNextNote();
        }

        function scheduleNextNote() {
            if (!isBgmPlaying) return;

            if (state === 'playing' || state === 'clear') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(bgmNotes[noteIdx], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                
                noteIdx = (noteIdx + 1) % bgmNotes.length;
            }

            let currentInterval = Math.max(70, 180 - (stage - 1) * 15);
            bgmTimer = setTimeout(scheduleNextNote, currentInterval);
        }

        function stopBGM() {
            isBgmPlaying = false;
            clearTimeout(bgmTimer);
        }

        // --- 게임 시스템 ---
        let state = 'ready'; 
        let stage = 1;
        let score = 0;       
        let totalScore = 0;  
        let hp = 3;
        const maxHp = 3;
        let frameCount = 0;
        let shieldEndTime = 0;

        let feedbackMessage = '';
        let feedbackColor = '#fff';
        let feedbackRainbow = false; 
        let feedbackLockTime = 0; 
        let milestoneReached = {}; 

        const trackYs = [100, 200, 300];
        let player = { track: 1, x: 100 }; 
        let objects = [];

        const itemDefs = [
            { type: 'diamond', char: '💎', score: 10, hp: 0, prob: 5 },
            { type: 'goldbag', char: '💰', score: 3, hp: 0, prob: 17 },
            { type: 'coin', char: '🪙', score: 1, hp: 0, prob: 39 },
            { type: 'dynamite', char: '🧨', score: 0, hp: -3, prob: 10 },
            { type: 'snake', char: '🐍', score: 0, hp: -2, prob: 15, extraSpeed: 3 }, 
            { type: 'bat', char: '🦇', score: 0, hp: -1, prob: 10, extraSpeed: 5 },
            { type: 'bolt', char: '⚙️', score: 0, hp: 1, prob: 2 },
            { type: 'shield', char: '🛡️', score: 0, hp: 0, shield: true, prob: 2 }
        ];

        const feedbackTexts = {
            coin: ['티끌 모아 태산 🪙', '이거 차비나 되려나 😮‍💨', '나쁘지 않아 😏'],
            goldbag: ['묵직하군 💰', '쏘 이지! 😎', '나이스 👍'],
            diamond: ['야르!! 😆', '대박이다!! 💎', '인생은 한방!! 🤑', '바로 이 맛 아닙니꽈! 🤩'],
            bat: ['으엑 징그러 🤢', '에잇 퉤! 🤮', '윽 😵'],
            snake: ['으...뱀이다!! 😱', '살려줘... 😭', '으읏 위험하다 😨'],
            dynamite: ['여기까지인가... ☠️', '이런데 폭탄이... 🤯', '다음 생에 보자 제군들 👻'],
            bolt: ['수리중....수리 완료 🛠️', '귀중한 부품이다 ⚙️', '한 숨 덜었군 😌'],
            shield: ['당분간 안심!!!! 🛡️', '드루와 드루와 😈', '나님을 당해낼 수 있을까? 😼']
        };

        document.addEventListener('keydown', (e) => {
            if (state !== 'playing') return; 
            if(['ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
            if (e.key === 'ArrowUp' && player.track > 0) player.track--;
            if (e.key === 'ArrowDown' && player.track < 2) player.track++;
        });

        function movePlayerUp(e) {
            if(e) e.preventDefault(); 
            if (state !== 'playing') return;
            if (player.track > 0) player.track--;
        }

        function movePlayerDown(e) {
            if(e) e.preventDefault();
            if (state !== 'playing') return;
            if (player.track < 2) player.track++;
        }

        upBtn.addEventListener('mousedown', movePlayerUp);
        upBtn.addEventListener('touchstart', movePlayerUp, {passive: false});
        
        downBtn.addEventListener('mousedown', movePlayerDown);
        downBtn.addEventListener('touchstart', movePlayerDown, {passive: false});

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            initAudio(); 
            
            stage = 1;
            score = 0;
            totalScore = 0;
            hp = maxHp;
            shieldEndTime = 0; 
            objects = [];
            player.track = 1;
            frameCount = 0;
            
            feedbackMessage = '오늘도 안전제일! 👷';
            feedbackColor = '#fff';
            feedbackRainbow = false;
            feedbackLockTime = 0;
            milestoneReached = {};

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
	// 게임이 실제로 시작되는 시점에 삽입
	window.parent.postMessage({ type: 'GAME_ACTUAL_START' }, '*');
            state = 'playing';
            
            document.body.focus();
            playBGM(); 
        }

        function spawnObject() {
            let numToSpawn = Math.min(3, Math.floor(stage / 2) + 1);
            let availableTracks = [0, 1, 2];

            let totalProb = 0;
            for (let item of itemDefs) {
                totalProb += item.prob;
            }

            let waveHazards = 0; 

            for (let i = 0; i < numToSpawn; i++) {
                let randIndex = Math.floor(Math.random() * availableTracks.length);
                let track = availableTracks.splice(randIndex, 1)[0]; 

                let rand = Math.random() * totalProb;
                let sum = 0;
                let selectedItem = itemDefs[0];
                
                for (let item of itemDefs) {
                    sum += item.prob;
                    if (rand <= sum) {
                        selectedItem = item;
                        break;
                    }
                }

                // 3개 라인이 모두 위험 요소(폭탄, 뱀, 박쥐)로 채워지는 억까 방지 시스템
                if (selectedItem.hp < 0) {
                    waveHazards++;
                    if (waveHazards >= 3) {
                        selectedItem = itemDefs.find(item => item.type === 'coin');
                    }
                }
                
                objects.push({
                    track: track,
                    x: canvas.width + 50,
                    ...selectedItem
                });
            }
        }

        function setObjectFeedback(type) {
            let currentTime = Date.now();
            if (feedbackLockTime > 0 && currentTime < feedbackLockTime) return; 

            let msgs = feedbackTexts[type];
            if (msgs) {
                feedbackMessage = msgs[Math.floor(Math.random() * msgs.length)];
                feedbackColor = '#fff';
                feedbackRainbow = (type === 'diamond' || type === 'shield');
            }
        }

        function checkScoreMilestones() {
            const milestones = [
                { score: 450, msg: '나도 모르겠다. 못하는 방법을 모르겠다! 🤷‍♂️' },
                { score: 330, msg: '무아지경!! 😵‍💫' },
                { score: 270, msg: '봤나? 이게 전데용!!! 😜' },
                { score: 180, msg: '거봐 나 진짜 좀 한다니까 😎' },
                { score: 110, msg: '아직 나는 배가 고프다 🤤' },
                { score: 80, msg: '이제 감잡아쓰 🤔' }
            ];

            for (let m of milestones) {
                if (totalScore >= m.score && !milestoneReached[m.score]) {
                    milestoneReached[m.score] = true;
                    feedbackMessage = m.msg;
                    feedbackRainbow = true; 
                    feedbackLockTime = Date.now() + 5000; 
                    break; 
                }
            }
        }

        function update() {
            if (state !== 'playing') return;
            frameCount++;
            
            let spawnRate = Math.max(30, 80 - stage * 10); 
            let moveSpeed = (5 + (stage * 0.8)) * 1.2; 

            if (frameCount % spawnRate === 0) spawnObject();

            let currentTime = Date.now();
            let isShielded = currentTime < shieldEndTime;

            if (feedbackLockTime > 0 && currentTime > feedbackLockTime) {
                feedbackMessage = ''; 
                feedbackRainbow = false;
                feedbackLockTime = 0; 
            }

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.x -= moveSpeed + ((obj.extraSpeed || 0) * 1.2); 

                if (obj.track === player.track && Math.abs(obj.x - player.x) < 40) {
                    
                    setObjectFeedback(obj.type);

                    if (obj.score > 0) {
                        playCoinSound(); 
                        score += obj.score;
                        totalScore += obj.score; 
                        checkScoreMilestones(); 
                        if (score >= 30) stageClear();
                    }
                    
                    if (obj.hp > 0) {
                        playPowerupSound();
                        hp += obj.hp;
                        if (hp > maxHp) hp = maxHp; 
                    }

                    if (obj.shield) {
                        playPowerupSound();
                        shieldEndTime = Date.now() + 5000; 
                    }

                    if (obj.hp < 0) {
                        if (!isShielded) {
                            playHurtSound(); 
                            hp += obj.hp; 
                            if (hp <= 0) {
                                hp = 0;
                                gameOver();
                            }
                        }
                    }
                    
                    objects.splice(i, 1);
                    continue;
                }

                if (obj.x < -50) objects.splice(i, 1);
            }
        }

        function stageClear() {
            state = 'clear';
            setTimeout(() => {
                stage++;
                score = 0; 
                hp = maxHp; 
                objects = [];
                state = 'playing';
            }, 2000); 
        }

        function gameOver() {
            state = 'gameover';
            finalScoreText.innerText = totalScore;

	// 이 줄을 추가하세요!
    window.parent.postMessage({ type: 'GAME_OVER', score: totalScore }, '*');

            
            if (totalScore <= 80) {
                playerRankText.innerText = "반응 속도 폐급 😱";
                playerRankText.style.color = "#9e9e9e";
            } else if (totalScore <= 110) {
                playerRankText.innerText = "반응 속도 틀딱 등급 👴";
                playerRankText.style.color = "#8d6e63";
            } else if (totalScore <= 180) { 
                playerRankText.innerText = "피지컬 브론즈 🥉";
                playerRankText.style.color = "#cd7f32"; 
            } else if (totalScore <= 270) { 
                playerRankText.innerText = "어디서 좀 노는 반응속도 😼";
                playerRankText.style.color = "#29b6f6"; 
            } else if (totalScore <= 330) { 
                playerRankText.innerText = "프로급 반응속도 ⚡";
                playerRankText.style.color = "#ab47bc"; 
            } else if (totalScore <= 450) { 
                playerRankText.innerText = "피지컬 마스터 👑";
                playerRankText.style.color = "#ffeb3b"; 
            } else { 
                playerRankText.innerText = "반응속도의 신 👼✨";
                playerRankText.style.color = "#ff1744"; 
            }

            gameOverScreen.style.display = 'flex';
            stopBGM(); 
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 선로 그리기
            ctx.strokeStyle = '#a1887f';
            ctx.lineWidth = 4;
            for (let y of trackYs) {
                ctx.fillStyle = '#271711';
                ctx.fillRect(0, y - 20, canvas.width, 40);
                
                ctx.beginPath();
                ctx.moveTo(0, y - 10); ctx.lineTo(canvas.width, y - 10);
                ctx.moveTo(0, y + 10); ctx.lineTo(canvas.width, y + 10);
                ctx.stroke();
                
                for(let i=0; i<canvas.width + 40; i+=40) {
                    ctx.beginPath();
                    let offset = (state === 'playing' || state === 'clear') 
                                 ? (frameCount * (5 + stage*0.8) * 1.2) % 40 : 0;
                    ctx.moveTo(i - offset, y - 15);
                    ctx.lineTo(i - offset, y + 15);
                    ctx.stroke();
                }
            }

            // 플레이어 & HP, 쉴드 그리기
            if (state !== 'gameover' && state !== 'ready') {
                const drawX = player.x; 
                const drawY = trackYs[player.track];

                ctx.font = '60px Arial'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🚃', drawX, drawY);

                let hpString = '';
                for(let i = 0; i < maxHp; i++) {
                    hpString += (i < hp) ? '❤️' : '🖤';
                }
                ctx.font = '16px Arial'; 
                ctx.fillStyle = '#fff';
                ctx.fillText(hpString, drawX, drawY - 45); 

                let currentTime = Date.now();
                if (currentTime < shieldEndTime) {
                    let timeLeft = Math.ceil((shieldEndTime - currentTime) / 1000); 
                    ctx.font = 'bold 22px Arial'; 
                    ctx.fillStyle = '#4fc3f7'; 
                    let bobbing = Math.sin(frameCount * 0.1) * 3; 
                    ctx.fillText(`🛡️ ${timeLeft}`, drawX, drawY + 45 + bobbing); 
                    ctx.fillStyle = '#fff'; 
                }
            }

            // 오브젝트 그리기
            ctx.font = '40px Arial'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let obj of objects) {
                ctx.fillText(obj.char, obj.x, trackYs[obj.track]);
            }

            // 상단 UI 영역
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, 40);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            
            ctx.textAlign = 'left';
            ctx.fillText(`STAGE: ${stage}`, 15, 20);
            ctx.fillText(`SCORE: ${score} / 30`, 110, 20);
            
            if (feedbackMessage) {
                ctx.textAlign = 'center';
                
                if (feedbackRainbow) {
                    let hue = (frameCount * 15) % 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                } else {
                    ctx.fillStyle = feedbackColor; 
                }
                
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`"${feedbackMessage}"`, canvas.width / 2, 20);
                ctx.fillStyle = '#fff'; 
            }

            ctx.textAlign = 'right';
            ctx.fillStyle = '#ffca28';
            ctx.fillText(`TOTAL SCORE: ${totalScore}`, canvas.width - 15, 20);

            if (state === 'clear') {
                ctx.fillStyle = 'rgba(76, 175, 80, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`STAGE ${stage} CLEAR!`, canvas.width/2, canvas.height/2 - 10);
                ctx.font = '24px Arial';
                ctx.fillText('다음 구역 진입 준비...', canvas.width/2, canvas.height/2 + 35);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
