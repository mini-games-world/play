<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Dash</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; touch-action: none; user-select: none; }
        #game-box { position: relative; width: 712px; height: 852px; max-width: 100vw; max-height: 100vh; background: #1a120c; overflow: hidden; border: 1px solid #333; }
        canvas { width: 100%; height: 100%; display: block; object-fit: contain; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white; padding: 40px; box-sizing: border-box; }
        #cd-num { font-size: 150px; color: #f1c40f; margin: 10px 0; }
        .btn { background: #f1c40f; border: none; color: #000; padding: 22px 60px; font-size: 26px; font-weight: bold; border-radius: 60px; cursor: pointer; margin-top: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; font-size: 18px; width: 100%; }
        .rank-item.me { background: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

<div id="game-box">
    <canvas id="gameCanvas"></canvas>
    
    <div id="countdown-ui" class="overlay">
        <p style="font-size:26px; text-transform:uppercase; color:#00f2ff;">DRAW A LINE TO ESCAPE!</p>
        <div id="cd-num">3</div>
        <p style="color:#f1c40f; font-weight:bold; font-size:18px;">START POINT BELOW ⬇️</p>
    </div>

    <div id="rank-ui" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; margin:0;">GAME OVER</h1>
        <p id="death-reason" style="font-size:18px; color:#bdc3c7; margin-top:5px;"></p>
        <div id="rank-board" style="width:100%; text-align:left; margin:20px 0;"></div>
        <button class="btn" onclick="resetGame()">RETRY</button>
    </div>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    const W = 712, H = 852;
    canvas.width = W; canvas.height = H;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function playSFX(type) {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const playTone = (f, s, d, t='sine', v=0.1) => {
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.type=t; o.frequency.setValueAtTime(f, s); g.gain.setValueAtTime(v, s);
            g.gain.exponentialRampToValueAtTime(0.001, s+d); o.connect(g); g.connect(audioCtx.destination);
            o.start(s); o.stop(s+d);
        };
        if (type === 'countdown') playTone(800, now, 0.1);
        else if (type === 'start') playTone(1200, now, 0.3, 'triangle');
        else if (type === 'item') { playTone(600, now, 0.1); playTone(900, now+0.1, 0.2); }
        else if (type === 'explosion') {
            const b=audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
            const d=b.getChannelData(0); for(let i=0;i<b.length;i++) d[i]=Math.random()*2-1;
            const s=audioCtx.createBufferSource(); s.buffer=b;
            const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(1000, now);
            const g=audioCtx.createGain(); g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0, now+0.5);
            s.connect(f); f.connect(g); g.connect(audioCtx.destination); s.start();
        } else if (type === 'fail') playTone(200, now, 0.8, 'sawtooth', 0.2);
    }

    // --- Persistent Data (Pop Orb Style) ---
    const rivalNames = ["SwiftMiner", "Giga_Drill", "Iron_Man", "CaveKing", "GoldHunter", "Neo_Miner", "Flash_Escape"];
    let topRivalName = localStorage.getItem('mine_dash_rival_name') || "Mega_Digger";
    let topRivalScore = parseInt(localStorage.getItem('mine_dash_rival_score')) || 75420;

    // --- Game Variables ---
    let state = 'COUNTDOWN', totalScore = 0, travelDistance = 0;
    let scrollX = 0, baseSpeed = 3.8, scrollSpeed = 3.8;
    let deathWallX = -350, cart = { x: W/2, y: 80, vx: 0, vy: 0, rot: 0 };
    let path = [], dynamites = [], items = [], bgAssets = [], isDrawing = false, demoPath = [], demoTick = 0;
    let nitroTimer = 0, shieldActive = false, warningTimer = 0, warningTriggered = false;

    const themes = [
        { dist: 0, color: '#1a120c', assetColor: '#3d2b1f' },
        { dist: 40, color: '#2c3e50', assetColor: '#7f8c8d' },
        { dist: 90, color: '#2e1a47', assetColor: '#9b59b6' },
        { dist: 150, color: '#3d0a0a', assetColor: '#e74c3c' }
    ];

    function initGame() {
        totalScore = 0; travelDistance = 0; scrollX = 0; scrollSpeed = baseSpeed;
        deathWallX = -350; cart = { x: W/2, y: 80, vx: 0, vy: 0, rot: 0 };
        path = []; dynamites = []; items = []; bgAssets = [];
        demoPath = []; demoTick = 0; nitroTimer = 0; shieldActive = false; 
        warningTimer = 0; warningTriggered = false;

        for(let i=0; i<30; i++) {
            bgAssets.push({ x: Math.random()*W*3, y: Math.random()*H, size: 20+Math.random()*80, parallax: 0.1+Math.random()*0.4, rot: Math.random()*Math.PI });
        }
        for(let i=0; i<8; i++) dynamites.push({ x: W + (i*900), y: 200 + Math.random()*(H-400), size: 65, sparkTick: Math.random()*100 });
        
        state = 'COUNTDOWN';
        document.getElementById('countdown-ui').style.display = 'flex';
        document.getElementById('rank-ui').style.display = 'none';
        document.getElementById('cd-num').innerText = '3';
        
        startCountdown();
    }

    function startCountdown() {
        let count = 3; playSFX('countdown');
        const itv = setInterval(() => {
            count--;
            if(count <= 0) {
                clearInterval(itv); document.getElementById('countdown-ui').style.display='none';
                bgm.play().catch(()=>{}); playSFX('start'); state='PLAYING';
		window.parent.postMessage({ type: 'GAME_START' }, '*');
            } else { document.getElementById('cd-num').innerText = count; playSFX('countdown'); }
        }, 1000);
    }

    function resetGame() { initGame(); }

    window.onload = () => { initGame(); requestAnimationFrame(mainLoop); };

    function mainLoop() {
        if (state === 'PLAYING') update();
        else if (state === 'COUNTDOWN') updateDemo();
        draw();
        requestAnimationFrame(mainLoop);
    }

    function updateDemo() {
        demoTick++;
        if (demoTick % 2 === 0 && demoPath.length < 55) {
            const lx = demoPath.length > 0 ? demoPath[demoPath.length-1].x : W/2 - 120;
            demoPath.push({ x: lx + 20, y: 500 + Math.sin(demoTick * 0.15) * 80 });
        }
    }

    function update() {
        demoTick++;
        if (nitroTimer > 0) { nitroTimer--; scrollSpeed = baseSpeed * 1.8; } else { scrollSpeed = baseSpeed; }
        cart.x += scrollSpeed;
        scrollX = cart.x - (W * 0.35); 
        
        let drillGap = cart.x - deathWallX;
        if (deathWallX < (cart.x - W * 0.35) - 50) deathWallX += scrollSpeed + 2.5; 
        else {
            if (drillGap > 350) deathWallX += scrollSpeed + 0.8;
            else if (drillGap < 220) deathWallX += scrollSpeed - 1.0;
            else deathWallX += scrollSpeed + 0.05;
            
            if (drillGap < 400 && !warningTriggered) { warningTriggered = true; warningTimer = 120; }
        }
        if(warningTimer > 0) warningTimer--;
        
        travelDistance += (scrollSpeed / baseSpeed) * 0.05;
        totalScore = Math.floor(travelDistance * 1500);

        bgAssets.forEach(a => { if (a.x < scrollX - 200) a.x = scrollX + W + 200; });
        dynamites.forEach(d => {
            d.sparkTick++;
            if(d.x < scrollX - 200) { d.x = scrollX + W + 600 + Math.random()*800; d.y = 150 + Math.random()*(H-300); }
            if(Math.abs(cart.x - (d.x + 32)) < 52 && Math.abs(cart.y - (d.y + 32)) < 52) {
                if (shieldActive) { shieldActive = false; d.x = -1000; playSFX('explosion'); } else endGame("BOMB EXPLODED!", true);
            }
        });

        if (Math.random() < 0.006) items.push({ x: scrollX + W + 200, y: 150 + Math.random()*(H-300), type: Math.random() > 0.5 ? 'nitro' : 'shield' });
        items.forEach((it, idx) => {
            if (Math.hypot(cart.x - it.x, cart.y - it.y) < 65) {
                if (it.type === 'nitro') nitroTimer = 180; else shieldActive = true;
                playSFX('item'); items.splice(idx, 1);
            }
            if (it.x < scrollX - 100) items.splice(idx, 1);
        });

        cart.vy += 0.35; cart.y += cart.vy;
        let onRail = false;
        for (let i = 0; i < path.length - 1; i++) {
            let p1 = path[i], p2 = path[i+1];
            if (cart.x > Math.min(p1.x, p2.x) - 35 && cart.x < Math.max(p1.x, p2.x) + 35) {
                let r = (cart.x - p1.x) / (p2.x - p1.x);
                let ly = p1.y + r * (p2.y - p1.y);
                if (cart.y + 280 > ly && cart.y - 150 < ly) { cart.y = ly - 15; cart.vy = 0; cart.rot = Math.atan2(p2.y - p1.y, p2.x - p1.x); onRail = true; break; }
            }
        }
        if(!onRail) cart.rot += 0.12;
        if (cart.x < deathWallX + 35) endGame("CRUSHED BY DRILL!");
        if (cart.y > H + 350) endGame("FELL INTO ABYSS!");
    }

    function draw() {
        let theme = themes[0];
        for (let i = 0; i < themes.length; i++) if (travelDistance >= themes[i].dist) theme = themes[i];
        ctx.fillStyle = theme.color; ctx.fillRect(0, 0, W, H);
        
        ctx.save(); ctx.translate(-scrollX * 0.2, 0);
        bgAssets.forEach(a => {
            ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot); ctx.fillStyle = theme.assetColor; ctx.globalAlpha = 0.4;
            ctx.beginPath(); ctx.moveTo(-a.size/2, 0); ctx.lineTo(0, -a.size/3); ctx.lineTo(a.size/2, 0); ctx.lineTo(0, a.size/2); ctx.closePath(); ctx.fill();
            ctx.restore();
        });
        ctx.restore();

        if (nitroTimer > 0) { ctx.strokeStyle = 'rgba(0, 242, 255, 0.4)'; ctx.lineWidth = 20; ctx.strokeRect(0, 0, W, H); }
        ctx.save(); ctx.translate(-scrollX, 0);

        ctx.fillStyle = '#333'; ctx.fillRect(deathWallX - 3000, 0, 3000, H);
        ctx.fillStyle = '#555';
        for(let i=0; i<H; i+=60) { ctx.beginPath(); ctx.moveTo(deathWallX, i); ctx.lineTo(deathWallX+85, i+30); ctx.lineTo(deathWallX, i+60); ctx.fill(); }

        dynamites.forEach(d => {
            ctx.fillStyle = '#c0392b'; ctx.fillRect(d.x, d.y, d.size, d.size);
            ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial'; ctx.textAlign='center'; ctx.fillText("BOMB", d.x+32, d.y+40);
            ctx.strokeStyle = '#444'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(d.x + 32, d.y); ctx.quadraticCurveTo(d.x+45, d.y-15, d.x+52, d.y-25); ctx.stroke();
            let sz = 8 + Math.sin(d.sparkTick * 0.4) * 4; ctx.fillStyle = d.sparkTick % 10 < 5 ? '#f39c12' : '#f1c40f';
            ctx.beginPath(); ctx.arc(d.x+52, d.y-25, sz, 0, 7); ctx.fill();
        });

        items.forEach(it => {
            ctx.font = "45px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type === 'nitro' ? "⚡" : "🛡️", it.x, it.y + 15);
            ctx.globalAlpha = 0.3; ctx.fillStyle = it.type === 'nitro' ? '#00f2ff' : '#f1c40f';
            ctx.beginPath(); ctx.arc(it.x, it.y, 45, 0, 7); ctx.fill(); ctx.globalAlpha = 1.0;
        });

        const cp = (state === 'COUNTDOWN') ? demoPath : path;
        if (cp.length > 1) {
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 17; ctx.lineCap = 'round';
            if(state === 'COUNTDOWN') ctx.setLineDash([15, 15]);
            ctx.beginPath(); ctx.moveTo(cp[0].x, cp[0].y);
            for(let i=1; i<cp.length; i++) ctx.lineTo(cp[i].x, cp[i].y);
            ctx.stroke(); ctx.setLineDash([]);
        }

        if (state === 'COUNTDOWN') {
            ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
            ctx.fillText("START POINT", W * 0.35, cart.y - 45); ctx.fillText("⬇️", W * 0.35, cart.y + 85 + (Math.sin(demoTick*0.1)*10));
        }

        ctx.save(); ctx.translate(cart.x, cart.y); ctx.rotate(cart.rot);
        if (shieldActive) { ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 5; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.arc(0, 0, 68, 0, 7); ctx.stroke(); ctx.setLineDash([]); }
        ctx.font = "52px Arial"; ctx.textAlign = "center"; ctx.fillText("🛒", 0, 15); ctx.fillText("👷‍♀️", 0, -15);
        ctx.restore(); ctx.restore();

        if (state === 'PLAYING') { ctx.fillStyle = "#f1c40f"; ctx.textAlign = "center"; ctx.font = "900 80px 'Arial Black'"; ctx.fillText(totalScore.toLocaleString(), W/2, 90); }
        ctx.fillStyle = "#f1c40f"; ctx.textAlign = "right"; ctx.font = "12px Arial"; ctx.fillText("TOP RANKER", W-20, 35);
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px Arial"; ctx.fillText(topRivalName, W-20, 55);
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 18px Arial"; ctx.fillText(topRivalScore.toLocaleString(), W-20, 75);

        if (state === 'PLAYING' && warningTimer > 0) {
            ctx.fillStyle = "rgba(255, 0, 0, " + (0.15 + Math.sin(demoTick*0.25)*0.15) + ")"; ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 15; ctx.strokeRect(0,0,W,H);
            ctx.fillStyle = "#ff4757"; ctx.font = "bold 26px Arial"; ctx.textAlign = "center"; ctx.fillText("⚠️ DRILL APPROACHING! ⚠️", W/2, H-100);
        }
    }

    function endGame(reason, explosion = false) {
        if (state === 'GAMEOVER') return;
        state = 'GAMEOVER'; if (explosion) playSFX('explosion'); else playSFX('fail');
	window.parent.postMessage({ type: 'GAME_OVER', score: totalScore }, '*');
        
        // Stealth Overwrite
        if (totalScore >= topRivalScore) {
            topRivalName = rivalNames[Math.floor(Math.random()*rivalNames.length)];
            topRivalScore = totalScore + Math.floor(Math.random()*1000) + 500;
            localStorage.setItem('mine_dash_rival_name', topRivalName);
            localStorage.setItem('mine_dash_rival_score', topRivalScore);
        }
        document.getElementById('death-reason').innerText = reason;
        showFinalRanking();
    }

    function showFinalRanking() {
        document.getElementById('rank-ui').style.display = 'flex';
        const board = document.getElementById('rank-board');
        const eliteFinal = Math.max(68420, totalScore - 4300);
        board.innerHTML = `<div class="rank-item"><span>1. ${topRivalName} (NEW!)</span><span>${topRivalScore.toLocaleString()}</span></div>
                           <div class="rank-item me"><span>2. YOU</span><span>${totalScore.toLocaleString()}</span></div>
                           <div class="rank-item"><span>3. Elite_Miner</span><span>${eliteFinal.toLocaleString()}</span></div>`;
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        return { x: cx * (W / r.width) + scrollX, y: cy * (H / r.height) };
    };

    const actAudio = () => { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); if(bgm.paused && state !== 'GAMEOVER') bgm.play().catch(()=>{}); };
    canvas.addEventListener('mousedown', e => { actAudio(); if(state==='PLAYING' || state==='COUNTDOWN'){isDrawing = true; path.push(getPos(e));} });
    canvas.addEventListener('mousemove', e => { if(isDrawing) path.push(getPos(e)); });
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('touchstart', e => { actAudio(); if(state==='PLAYING' || state==='COUNTDOWN'){isDrawing = true; path.push(getPos(e)); e.preventDefault();} }, {passive: false});
    canvas.addEventListener('touchmove', e => { if(isDrawing){path.push(getPos(e)); e.preventDefault();} }, {passive: false});
    window.addEventListener('touchend', () => isDrawing = false);
</script>
</body>
</html>
