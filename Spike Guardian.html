function addNeonEdge(mesh, colorHex, intensity = 'normal') {
    const edges = new THREE.EdgesGeometry(mesh.geometry);
    const line1 = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 1.0 }));
    mesh.add(line1);
    const line2 = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6 }));
    line2.scale.setScalar(1.08); mesh.add(line2);
    if (intensity === 'ultra') {
        const line3 = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
        line3.scale.setScalar(1.16); mesh.add(line3);
    }
    return line1;
}

function createThemeTexture(type) {

        for (let x = 0; x <= SIZE; x += 256) { for (let y = 0; y <= SIZE; y += 256) { if (Math.random() > 0.3) { drawGlowDot(x, y, 40, 'rgb(200, 100, 255)', 0.7); ctx.fillStyle = 'rgba(240, 170, 255, 0.95)'; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill(); } } }

        for (let i = 0; i < 200; i++) { const x = Math.random() * SIZE, y = Math.random() * SIZE; drawGlowDot(x, y, 8 + Math.random() * 40, 'rgb(0, 255, 230)', 0.3 + Math.random() * 0.4); } drawGlowDot(SIZE/2, SIZE/2, 500, 'rgb(0, 255, 240)', 0.28); addNoise(0.012);

        const bg = ctx.createLinearGradient(0, 0, SIZE, SIZE); bg.addColorStop(0, 'rgba(30, 0, 40, 0.90)'); bg.addColorStop(0.5, 'rgba(15, 0, 25, 0.70)'); bg.addColorStop(1, 'rgba(30, 0, 40, 0.90)'); ctx.fillStyle = bg; ctx.fillRect(0, 0, SIZE, SIZE);
        for (let wave = 0; wave < 70; wave++) { const baseY = wave * 30 + Math.random() * 15, amp = 25 + Math.random() * 55, freq = 0.003 + Math.random() * 0.008, phase = Math.random() * Math.PI * 2, alpha = 0.22 + Math.random() * 0.35, hue = 270 + Math.random() * 90; ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${alpha})`; ctx.lineWidth = 1.5 + Math.random() * 1.0; ctx.beginPath(); for (let x = 0; x < SIZE; x += 4) { const y = baseY + Math.sin(x * freq + phase) * amp; if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); } ctx.stroke(); }
        for (let cluster = 0; cluster < 40; cluster++) { const cx = Math.random() * SIZE, cy = Math.random() * SIZE; for (let p = 0; p < 30; p++) { const px = cx + (Math.random() - 0.5) * 300, py = cy + (Math.random() - 0.5) * 300; drawGlowDot(px, py, 10 + Math.random() * 40, 'rgb(255, 100, 220)', 0.3 + Math.random() * 0.5); } } addNoise(0.025);
    } else if (type === 'overload') {
        ctx.fillStyle = '#000912'; ctx.fillRect(0, 0, SIZE, SIZE);
        const bg = ctx.createRadialGradient(SIZE/2, SIZE/2, 0, SIZE/2, SIZE/2, SIZE*0.75); bg.addColorStop(0, 'rgba(0, 20, 40, 0.95)'); bg.addColorStop(1, 'rgba(0, 6, 14, 0.4)'); ctx.fillStyle = bg; ctx.fillRect(0, 0, SIZE, SIZE);
        for (let layer = 0; layer < 6; layer++) { const alpha = 0.15 + layer * 0.10, brightness = 140 + layer * 25; ctx.strokeStyle = `rgba(0, ${brightness}, 255, ${alpha})`; ctx.lineWidth = layer >= 4 ? 4 : 1.5; for (let i = 0; i < 25; i++) { drawLightning(Math.random() * SIZE, Math.random() * SIZE, Math.random() * SIZE, Math.random() * SIZE, 6, 180); } }
        drawGlowDot(SIZE/2, SIZE/2, 700, 'rgb(0, 180, 255)', 0.35); drawGlowDot(SIZE/2, SIZE/2, 350, 'rgb(80, 220, 255)', 0.50); drawGlowDot(SIZE/2, SIZE/2, 120, 'rgb(180, 240, 255)', 0.70); addNoise(0.035);

        for (let i = 0; i < 240; i++) { const x = Math.random() * SIZE, y = Math.random() * SIZE; drawGlowDot(x, y, 12 + Math.random() * 50, 'rgb(255, 220, 0)', 0.4 + Math.random() * 0.5); }

        if (isNaN(this.targetX) || isNaN(this.targetY)) return;

            this.mesh.scale.lerp(new THREE.Vector3(2.5, 2.5, 2.5), 0.1);

        this.angle += (angleSpeed + mouseSpeed * 0.001) * slowMoFactor;

class Enemy {
    constructor(isGiant = false) {
        this.isGiant = isGiant;
        this.mesh = new THREE.Mesh(geoE, this.isGiant ? matE_giant : matE_normal);
        this.color = this.isGiant ? '#cc7700' : '#444455';
        addNeonEdge(this.mesh, this.isGiant ? 0xffaa00 : 0x444455, 'normal');
        gameWorldGroup.add(this.mesh); this.reset();
    }
    reset() {
        const side = Math.floor(Math.random() * 4);
        if (side == 0) { this.x = Math.random() * mapW; this.y = -100; } else if (side == 1) { this.x = mapW + 100; this.y = Math.random() * mapH; } else if (side == 2) { this.x = Math.random() * mapW; this.y = mapH + 100; } else { this.x = -100; this.y = Math.random() * mapH; }
        this.size = this.isGiant ? 45 : 18 + Math.random() * 10; this.hp = this.isGiant ? 5 : 1;
        let diffMult = Math.min(3.0, 1 + currentSessionGems * 0.001);
        this.speed = (this.isGiant ? 0.6 : 1.2) * diffMult;
        this.mesh.scale.setScalar(this.size);
    }
    update() {
        if (!player) return;
        const dx = player.x - this.x, dy = player.y - this.y; let d = Math.sqrt(dx * dx + dy * dy);
        if (d < 0.001 || isNaN(d)) d = 0.001;
        this.x += (dx / d) * this.speed * slowMoFactor; this.y += (dy / d) * this.speed * slowMoFactor;
        if (d < player.radius + this.size / 2 - 5) {
            if (titanTimer > 0) { this.hp = 0; this.die(); playSfx('hit'); }
            else if (!isInvincible) { if (active) endGame(); return; }
        }
        balls.forEach(b => {
            const bdx = b.x - this.x, bdy = b.y - this.y; const bd = Math.sqrt(bdx * bdx + bdy * bdy);
            let hitBox = up_size + this.size / 2 + (playerLevel - 1) * 2;
            if (bd < hitBox) {
                this.hp--; playSfx('hit'); createParticles(this.x, this.y, this.color, 4);
                if (this.hp <= 0) this.die(); else { let knockD = d; if (knockD < 0.001 || isNaN(knockD)) knockD = 0.001; this.x -= (dx / knockD) * 20 * slowMoFactor; this.y -= (dy / knockD) * 20 * slowMoFactor; }
            }
        });
        if (!isNaN(this.x) && !isNaN(this.y)) {
            this.mesh.position.set(this.x - mapW / 2, 0, this.y - mapH / 2);
            this.mesh.rotation.x += 0.02; this.mesh.rotation.y += 0.02;
        }

    destroy() { gameWorldGroup.remove(this.mesh); }

class Gem {
    constructor(x, y) {
        this.x = x; this.y = y; this.v = { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 };
        this.mesh = new THREE.Mesh(geoG, matG); addNeonEdge(this.mesh, 0xffff44, 'normal'); gameWorldGroup.add(this.mesh);
        this.isEmpMagnetized = false;
    }
    update() {
        if (!player) return false;
        const dx = player.x - this.x, dy = player.y - this.y; let d = Math.sqrt(dx * dx + dy * dy);
        if (d < 0.001 || isNaN(d)) d = 0.001;
        let currentMagnet = magnetTimer > 0 ? 800 : up_magnet;
        if (this.isEmpMagnetized) { this.x += (dx / d) * 45 * slowMoFactor; this.y += (dy / d) * 45 * slowMoFactor; }
        else if(d < currentMagnet) { this.x += (dx / d) * 15 * slowMoFactor; this.y += (dy / d) * 15 * slowMoFactor; }
        else { this.x += this.v.x * slowMoFactor; this.y += this.v.y * slowMoFactor; this.v.x *= (1 - 0.05 * slowMoFactor); this.v.y *= (1 - 0.05 * slowMoFactor); }

        return false;
    }
}

    let names = ['NX_GHOST','CYBER_01','VOID_RUN','NEO_HACK','GLITCH_X']; names.sort(() => Math.random() - 0.5);
    let lbContent = ""; const rankColors = ['#ffee44','#aaaaaa','#cd7f32','#ffffff','#ffffff']; const rankLabels = ['01','02','03','04','05'];
    for (let i = 0; i < 5; i++) {
        if (i === myRank - 1) {
            const nameSlot = isNewRecord ? '???' : 'YOU'; const id = isNewRecord ? 'id="my-lb-slot"' : '';
            lbContent += `<div ${id} style="margin:8px 0; font-size:13px; color:#44ffff; text-shadow:0 0 10px #44ffff; letter-spacing:2px; border-left:3px solid #44ffff; padding-left:10px;">[${rankLabels[i]}] ${nameSlot} .... ${totalGems}</div>`;
        } else { lbContent += `<div style="margin:8px 0; font-size:13px; color:${rankColors[i]}; letter-spacing:2px; padding-left:13px;">[${rankLabels[i]}] ${names.pop()||'BOT'} .... ${allScores[i]}</div>`; }
    }
    lbHtml += lbContent + `</div>`;
    if (isNewRecord) {
        ruleDesc.innerHTML = `
            <div style="color:#44ffff; font-size:20px; margin-bottom:10px; text-shadow:0 0 15px #44ffff; font-family:'Orbitron',monospace; letter-spacing:3px;">◈ NEW HIGH SCORE ◈</div>
            <div style="font-size:40px; font-weight:bold; color:#ffee44; margin-bottom:20px; text-shadow:0 0 20px #ffee44; font-family:'Orbitron',monospace;">${totalGems}</div>
            <input type="text" id="nick-input" placeholder="ENTER NICKNAME" style="padding:12px; font-size:13px; width:220px; text-align:center; border-radius:2px; border:1px solid #44ffff; outline:none; margin-bottom:15px; color:#44ffff; background:rgba(0,0,50,0.8); font-family:'Orbitron',monospace; letter-spacing:2px; box-shadow:0 0 10px rgba(68,255,255,0.3);">
            <br><button id="submit-btn" style="padding:12px 25px; font-size:13px; background:transparent; color:#cc4466; border:2px solid #cc4466; border-radius:2px; text-shadow:0 0 10px #cc4466; box-shadow:0 0 15px rgba(200,68,100,0.4); letter-spacing:3px;">[ SUBMIT ]</button>
        `;
        countdownEl.style.display = 'none'; document.getElementById('nick-input').addEventListener('click', e => e.stopPropagation());
        document.getElementById('submit-btn').addEventListener('click', e => {
            e.stopPropagation(); let nick = (document.getElementById('nick-input').value || 'GHOST').toUpperCase();
            ruleDesc.innerHTML = lbHtml.replace('???', nick); countdownEl.style.display = 'block'; countdownEl.innerText = "[ TAP TO RESTART ]"; countdownEl.style.fontSize = "26px"; countdownEl.style.letterSpacing = "3px";
            setTimeout(() => { overlay.addEventListener('click', restartGame, { once: true }); }, 500);
        });
    } else {
        ruleDesc.innerHTML = lbHtml; countdownEl.style.display = 'block'; countdownEl.innerText = "[ TAP TO RESTART ]"; countdownEl.style.fontSize = "26px"; countdownEl.style.letterSpacing = "3px";
        overlay.addEventListener('click', restartGame, { once: true });
    }
}
setTimeout(startCountdown, 100);
