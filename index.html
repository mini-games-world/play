<!DOCTYPE html>
<html lang="ko">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-WFTKGP2F');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>미니게임 월드 - 실시간 랭킹</title>
    <style>
        /* [기존 스타일 복구] */
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background: #eee; }
        header { background: #333; color: white; padding: 0.8rem; text-align: center; flex-shrink: 0; font-weight: bold; z-index: 20; font-size: 1.1rem; }
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        nav { width: 220px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; overflow-y: auto; }
        nav h3 { margin-top: 15px; font-size: 1rem; color: #555; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 10px; }
        .menu-list { display: flex; flex-direction: column; gap: 8px; }
        nav button { width: 100%; padding: 12px; cursor: pointer; border: 1px solid #eee; background: white; border-radius: 10px; transition: 0.2s; font-size: 0.95rem; text-align: left; }
        nav button:hover { background: #007bff; color: white; }
        .rank-board-btn { background: #ffd700; font-weight: bold; border: 2px solid #e6b800; margin-bottom: 10px; }

        #content_area { flex: 1; position: relative; background: #fff; }
        #welcome_screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; z-index: 5; text-align: center; padding: 20px; }
        .game-view { width: 100%; height: 100%; border: none; z-index: 1; transition: filter 0.3s ease; }
        .blurred { filter: blur(5px) grayscale(50%); pointer-events: none; }

        #rank_board_view { position: absolute; inset: 0; background: #f1f2f6; z-index: 100; display: none; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .rank-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .rank-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f1f1; font-size: 13px; }

        #overlay_container { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 340px; max-height: 80vh; overflow-y: auto; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-register { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-restart-big { width: 100%; padding: 15px; background: #2ed573; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .modal-rank-list { text-align: left; margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        .modal-rank-item { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .modal-rank-item.my-rank { background: #fff9c4; font-weight: bold; border-radius: 5px; }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            nav { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; padding: 10px; overflow-y: hidden; }
            nav h3 { display: none; }
            .menu-list { flex-direction: row; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            nav button { width: auto; white-space: nowrap; padding: 10px 18px; }
            #rank_board_view { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>🎮 미니게임 월드</header>

    <div class="main-container">
        <nav>
            <button class="rank-board-btn" onclick="showRankBoard()">🏆 실시간 랭킹</button>
            <h3>게임 목록</h3>
            <div class="menu-list">
                <button onclick="changeGame('rabbit.html')">🐰 토끼</button>
                <button onclick="changeGame('escape.html')">🚌 탈출</button>
                <button onclick="changeGame('spike.html')">🐙 스파이크</button>
                <button onclick="changeGame('link.html')">👩‍🔧 배관</button>
                <button onclick="changeGame('rhythm.html')">🎵 리듬</button>
                <button onclick="changeGame('miner_game_v3.html')">🚃 마이너</button>
            </div>
        </nav>

        <div id="content_area">
            <div id="welcome_screen">
                <h2>🕹️ 미니게임 월드 🕹️</h2>
                <p>게임을 선택하여 플레이어들과 경쟁해보세요!</p>
            </div>
            <iframe src="" name="game_frame" id="game_frame" class="game-view"></iframe>
            <div id="rank_board_view">
                <h2 style="text-align:center; margin-bottom:30px;">🏆 실시간 랭킹 TOP 10</h2>
                <div class="rank-grid" id="rank_grid_container"></div>
            </div>
        </div>
    </div>

    <div id="overlay_container">
        <div class="modal-content">
            <div id="modal_step_reg">
                <h2 style="margin-top:0;">GAME OVER</h2>
                <p>점수: <strong id="score_val" style="color:#007bff; font-size: 1.5rem;">0</strong></p>
                <input type="text" id="nickname" placeholder="닉네임 입력">
                <button class="btn-register" id="reg_btn" onclick="saveRank()">기록 등록하고 순위보기</button>
                <button onclick="showModalRank()" style="margin-top:10px; width:100%; padding:12px; background:#f1f2f6; border:none; border-radius:10px; cursor:pointer; color:#666; font-weight:bold;">등록하지 않고 순위보기</button>
                <button class="btn-restart-big" onclick="restartGame()">🔄 즉시 다시하기</button>
            </div>

            <div id="modal_step_rank" class="hidden">
                <h2 id="modal_rank_title" style="font-size: 1.2rem; color: #333; margin-top:0;">TOP 10 랭킹</h2>
                <div id="modal_rank_content" class="modal-rank-list"></div>
                <button class="btn-restart-big" onclick="restartGame()" style="margin-top:20px;">🔄 다시 도전하기</button>
                <button onclick="closeOverlay()" style="margin-top:12px; background:none; border:none; color:#888; cursor:pointer;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // [스크립트 로직 복구]
        let gameStartTime = 0;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuIQKqdU85NcnQFKT58d2w9ESKyiPmQzoZGWDxrICpJ7MNLnYBL9yJUGRAI24-ML3p/exec";
        let currentScore = 0;
        let currentGameFile = '';
        const gameTitles = {
            'rabbit.html': '🐰 하늘을 나는 토끼',
            'escape.html': '🚌 브릿의 광속 탈출',
            'spike.html': '🐙 스파이크 가디언',
            'link.html': '👩‍🔧 배관 수리',
            'rhythm.html': '🎵 두더지 리듬',
            'miner_game_v3.html': '🚃 마이너 러쉬'
        };

        function changeGame(fileName) {
            currentGameFile = fileName;
            document.getElementById('rank_board_view').style.display = 'none';
            document.getElementById('welcome_screen').style.display = 'none';
            const frame = document.getElementById('game_frame');
            frame.classList.remove('blurred');
            frame.src = fileName;
            closeOverlay();
        }

        async function saveRank() {
            if (currentScore <= 0) {
                alert("0점은 랭킹에 등록할 수 없습니다. 🔥");
                return;
            }
            const nickInput = document.getElementById('nickname');
            const nick = nickInput.value.trim();
            if (nick.length < 2) return alert("닉네임을 2자 이상 입력해주세요!");

            const regBtn = document.getElementById('reg_btn');
            regBtn.disabled = true;
            regBtn.innerText = '전송 중...';

            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ game: currentGameFile, nick: nick, score: currentScore })
                });
                showModalRank(nick);
            } catch (e) {
                alert("오류 발생!");
                regBtn.disabled = false;
                regBtn.innerText = '기록 등록하고 순위보기';
            }
        }

        async function showModalRank(myNick = "") {
            const regStep = document.getElementById('modal_step_reg');
            const rankStep = document.getElementById('modal_step_rank');
            const rankContent = document.getElementById('modal_rank_content');
            const rankTitle = document.getElementById('modal_rank_title');

            regStep.classList.add('hidden');
            rankStep.classList.remove('hidden');
            rankTitle.innerText = `${gameTitles[currentGameFile]} TOP 10`;
            rankContent.innerHTML = '<p style="text-align:center;">순위 불러오는 중...</p>';

            try {
                const response = await fetch(GAS_URL);
                const allData = await response.json();
                let gameRanks = allData
                    .filter(i => i.game === currentGameFile)
                    .sort((a,b) => b.score - a.score)
                    .slice(0, 10);

                let listHtml = '';
                if (gameRanks.length === 0) {
                    listHtml = '<p style="text-align:center; color:#999;">아직 등록된 기록이 없습니다.</p>';
                } else {
                    gameRanks.forEach((r, i) => {
                        const isMe = (myNick !== "" && r.nick === myNick && r.score === currentScore);
                        listHtml += `
                            <div class="modal-rank-item ${isMe ? 'my-rank' : ''}">
                                <span>${i+1}. ${r.nick} ${isMe ? '(나)' : ''}</span>
                                <b>${r.score.toLocaleString()}</b>
                            </div>`;
                    });
                }
                rankContent.innerHTML = listHtml;
            } catch (e) {
                rankContent.innerHTML = '<p style="text-align:center; color:red;">랭킹 로딩 실패</p>';
            }
        }

        async function showRankBoard() {
            document.getElementById('welcome_screen').style.display = 'none';
            document.getElementById('rank_board_view').style.display = 'block';
            document.getElementById('game_frame').src = '';
            const container = document.getElementById('rank_grid_container');
            container.innerHTML = '<p style="text-align:center; width:100%;">로딩 중...</p>';
            try {
                const response = await fetch(GAS_URL);
                const allData = await response.json();
                container.innerHTML = '';
                Object.keys(gameTitles).forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'rank-card';
                    let gameRanks = allData.filter(i => i.game === file).sort((a,b) => b.score - a.score).slice(0, 10);
                    let listHtml = gameRanks.length > 0 ? '' : '<p style="color:#999; font-size:13px;">기록 없음</p>';
                    gameRanks.forEach((r, i) => { listHtml += `<div class="rank-item"><span>${i+1}. ${r.nick}</span><b>${r.score.toLocaleString()}</b></div>`; });
                    card.innerHTML = `<h4>${gameTitles[file]}</h4>${listHtml}`;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '<p>로딩 실패</p>';
            }
        }

        window.addEventListener('message', function(e) {
            const data = e.data;
            const now = Date.now();
            if (data.type === 'GAME_ACTUAL_START') {
                gameStartTime = now;
                if (typeof gtag === 'function') {
                    gtag('event', 'game_start', { 'game_title': gameTitles[currentGameFile] });
                }
            }
            if (data.type === 'GAME_OVER' || data.type === 'GAME_CLEAR') {
                currentScore = data.score;
                const playTimeSec = gameStartTime > 0 ? Math.floor((now - gameStartTime) / 1000) : 0;
                const result = (data.type === 'GAME_CLEAR') ? 'success' : 'fail';
                if (typeof gtag === 'function') {
                    gtag('event', 'game_end', {
                        'game_title': gameTitles[currentGameFile],
                        'play_time_sec': playTimeSec,
                        'result': result,
                        'score': currentScore
                    });
                }
                document.getElementById('score_val').innerText = currentScore.toLocaleString();
                document.getElementById('game_frame').classList.add('blurred');
                document.getElementById('modal_step_reg').classList.remove('hidden');
                document.getElementById('modal_step_rank').classList.add('hidden');
                document.getElementById('overlay_container').style.display = 'flex';
                document.getElementById('reg_btn').disabled = false;
                document.getElementById('reg_btn').innerText = '기록 등록하고 순위보기';
            }
        });

        function restartGame() {
            if (typeof gtag === 'function') {
                gtag('event', 'game_restart', { 'game_title': gameTitles[currentGameFile] });
            }
            const frame = document.getElementById('game_frame');
            frame.classList.remove('blurred');
            frame.src = frame.src;
            closeOverlay();
        }

        function closeOverlay() {
            document.getElementById('overlay_container').style.display = 'none';
            document.getElementById('game_frame').classList.remove('blurred');
        }
    </script>
</body>
</html>
