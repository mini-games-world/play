    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 미니게임 월드</title>
    <style>
        /* 기본 레이아웃 설정 */
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background: #eee; }
        header { background: #333; color: white; padding: 1rem; text-align: center; flex-shrink: 0; font-weight: bold; z-index: 20; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* [PC] 왼쪽 메뉴 스타일 */
        nav { 
            width: 220px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 15px; 
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
        }
        .menu-list { flex: 1; overflow-y: auto; }
        nav h3 { margin-top: 0; font-size: 1rem; color: #555; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 15px; }
        
        nav button { 
            display: block; width: 100%; padding: 12px; margin-bottom: 10px; 
            cursor: pointer; border: 1px solid #eee; background: white; border-radius: 10px;
            transition: 0.2s; font-size: 0.95rem; text-align: left;
        }
        nav button:hover { background: #007bff; color: white; }

        /* 방문자 카운터 (PC) */
        .visitor-counter { padding: 15px 0; text-align: center; border-top: 1px solid #ddd; flex-shrink: 0; }
        .visitor-counter p { font-size: 11px; color: #888; margin-bottom: 5px; }

        /* 초기 시작 화면 및 게임 화면 */
        #welcome_screen {
            position: absolute; top: 0; right: 0; bottom: 0; left: 220px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; z-index: 5; text-align: center;
        }
        .game-view { flex: 1; border: none; background: #fff; width: 100%; height: 100%; z-index: 1; }

        /* ⭐ [모바일 최적화] 핵심 수정 부분 */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            
            nav { 
                width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; 
                padding: 10px; flex-direction: column; /* 메뉴와 카운터를 세로로 배치 */
            }
            
            .menu-list { 
                display: flex; flex-direction: row; gap: 8px; overflow-x: auto; 
                width: 100%; padding-bottom: 5px;
                -webkit-overflow-scrolling: touch; /* 부드러운 스크롤 */
            }
            
            nav h3 { display: none; }
            nav button { 
                flex: 0 0 auto; width: auto; margin-bottom: 0; padding: 8px 12px; font-size: 0.85rem;
            }

            /* 모바일에서 카운터가 잘 보이지 않던 문제 해결 */
            .visitor-counter { 
                border-top: none; padding: 5px 0 0 0; text-align: left; width: 100%;
            }
            .visitor-counter p { display: none; }

            #welcome_screen { left: 0; z-index: 5; height: 100%; }
        }
    </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WFTKGP2F"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <header>🎮 미니게임 월드</header>

    <div class="main-container">
        <nav>
            <div class="menu-list">
                <h3>게임 목록</h3>
                <button onclick="changeGame('rabbit.html')">🐰 하늘을 나는 토끼</button>
                <button onclick="changeGame('escape.html')">🚌 브릿의 광속 탈출</button>
                <button onclick="changeGame('spike.html')">🐙 스파이크 가디언</button>
                <button onclick="changeGame('link.html')"> 👩‍🔧 배관 수리</button>
                <button onclick="changeGame('survivor_dig.html')">  💎 서바이버 디그</button>
                <button onclick="changeGame('magnetic.html')">  🧲 마그네틱 커넥터</button>
                <button onclick="changeGame('rhythm.html')">  NEW 🎵 두더지 리듬</button>
                <button onclick="changeGame('miner_game_m4.html')">  NEW 🚃 마이너 러쉬</button>
            </div>

            <div class="visitor-counter">
                <a href="https://mini-games-world.github.io/play/">
                    <img src="https://endpoint.moe/hits?url=https://mini-games-world.github.io/play&color=007bff&style=flat&label=VISITS" 
                         alt="방문자 카운터"
                         onerror="this.src='https://img.shields.io/badge/VISITS-COUNTING-blue'">
                </a>
            </div>
        </nav>

        <div id="welcome_screen">
            <h2>🕹️ 플레이 준비 완료! 🕹️</h2>
            <p>게임을 선택해 주세요.</p>
        </div>

        <iframe src="" name="game_frame" id="game_frame" class="game-view"></iframe>
    </div>

    <script>
        function changeGame(fileName) {
            document.getElementById('welcome_screen').style.display = 'none';
            document.getElementById('game_frame').src = fileName;
        }
    </script>
</body>
</html>
