<!DOCTYPE html>
<html lang="ko">
<head>
<script>
    let gameStartTime = 0;
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuIQKqdU85NcnQFKT58d2w9ESKyiPmQzoZGWDxrICpJ7MNLnYBL9yJUGRAI24-ML3p/exec";
    let currentScore = 0;
    let currentGameFile = '';
    const gameTitles = {
        'rabbit.html': '🐰 하늘을 나는 토끼',
        'escape.html': '🚌 브릿의 광속 탈출',
        'spike.html': '🐙 스파이크 가디언',
        'link.html': '👩‍🔧 배관 수리',
        'rhythm.html': '🎵 두더지 리듬',
        'miner_game_v3.html': '🚃 마이너 러쉬'
    };

    function changeGame(fileName) {
        currentGameFile = fileName;
        document.getElementById('rank_board_view').style.display = 'none';
        document.getElementById('welcome_screen').style.display = 'none';
        const frame = document.getElementById('game_frame');
        frame.classList.remove('blurred');
        frame.src = fileName;
        closeOverlay();
    }

    // [중요] 사라졌던 랭킹 저장 함수를 다시 추가했습니다!
    async function saveRank() {
        if (currentScore <= 0) {
            alert("0점은 랭킹에 등록할 수 없습니다. 🔥");
            return;
        }

        const nickInput = document.getElementById('nickname');
        const nick = nickInput.value.trim();
        if (nick.length < 2) return alert("닉네임을 2자 이상 입력해주세요!");

        const regBtn = document.getElementById('reg_btn');
        regBtn.disabled = true;
        regBtn.innerText = '전송 중...';

        try {
            // Google Sheets로 데이터 전송
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ game: currentGameFile, nick: nick, score: currentScore })
            });
            // 전송 후 랭킹 보기 화면으로 이동
            showModalRank(nick);
        } catch (e) {
            alert("오류 발생!");
            regBtn.disabled = false;
            regBtn.innerText = '기록 등록하고 순위보기';
        }
    }

    async function showModalRank(myNick = "") {
        const regStep = document.getElementById('modal_step_reg');
        const rankStep = document.getElementById('modal_step_rank');
        const rankContent = document.getElementById('modal_rank_content');
        const rankTitle = document.getElementById('modal_rank_title');

        regStep.classList.add('hidden');
        rankStep.classList.remove('hidden');
        rankTitle.innerText = `${gameTitles[currentGameFile]} TOP 10`;
        rankContent.innerHTML = '<p style="text-align:center;">순위 불러오는 중...</p>';

        try {
            const response = await fetch(GAS_URL);
            const allData = await response.json();
            
            let gameRanks = allData
                .filter(i => i.game === currentGameFile)
                .sort((a,b) => b.score - a.score)
                .slice(0, 10);

            let listHtml = '';
            if (gameRanks.length === 0) {
                listHtml = '<p style="text-align:center; color:#999;">아직 등록된 기록이 없습니다.</p>';
            } else {
                gameRanks.forEach((r, i) => {
                    const isMe = (myNick !== "" && r.nick === myNick && r.score === currentScore);
                    listHtml += `
                        <div class="modal-rank-item ${isMe ? 'my-rank' : ''}">
                            <span>${i+1}. ${r.nick} ${isMe ? '(나)' : ''}</span>
                            <b>${r.score.toLocaleString()}</b>
                        </div>`;
                });
            }
            rankContent.innerHTML = listHtml;
        } catch (e) {
            rankContent.innerHTML = '<p style="text-align:center; color:red;">랭킹 로딩 실패</p>';
        }
    }

    async function showRankBoard() {
        document.getElementById('welcome_screen').style.display = 'none';
        document.getElementById('rank_board_view').style.display = 'block';
        document.getElementById('game_frame').src = '';
        const container = document.getElementById('rank_grid_container');
        container.innerHTML = '<p style="text-align:center; width:100%;">로딩 중...</p>';
        try {
            const response = await fetch(GAS_URL);
            const allData = await response.json();
            container.innerHTML = '';
            Object.keys(gameTitles).forEach(file => {
                const card = document.createElement('div');
                card.className = 'rank-card';
                let gameRanks = allData.filter(i => i.game === file).sort((a,b) => b.score - a.score).slice(0, 10);
                let listHtml = gameRanks.length > 0 ? '' : '<p style="color:#999; font-size:13px;">기록 없음</p>';
                gameRanks.forEach((r, i) => { listHtml += `<div class="rank-item"><span>${i+1}. ${r.nick}</span><b>${r.score.toLocaleString()}</b></div>`; });
                card.innerHTML = `<h4>${gameTitles[file]}</h4>${listHtml}`;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = '<p>로딩 실패</p>';
        }
    }

    window.addEventListener('message', function(e) {
        const data = e.data;
        const now = Date.now();

        if (data.type === 'GAME_ACTUAL_START') {
            gameStartTime = now;
            gtag('event', 'game_start', {
                'game_title': gameTitles[currentGameFile]
            });
        }

        if (data.type === 'GAME_OVER' || data.type === 'GAME_CLEAR') {
            currentScore = data.score;
            const playTimeSec = gameStartTime > 0 ? Math.floor((now - gameStartTime) / 1000) : 0;
            const result = (data.type === 'GAME_CLEAR') ? 'success' : 'fail';

            gtag('event', 'game_end', {
                'game_title': gameTitles[currentGameFile],
                'play_time_sec': playTimeSec,
                'result': result,
                'score': currentScore
            });

            document.getElementById('score_val').innerText = currentScore.toLocaleString();
            document.getElementById('game_frame').classList.add('blurred');
            document.getElementById('modal_step_reg').classList.remove('hidden');
            document.getElementById('modal_step_rank').classList.add('hidden');
            document.getElementById('overlay_container').style.display = 'flex';
            document.getElementById('reg_btn').disabled = false;
            document.getElementById('reg_btn').innerText = '기록 등록하고 순위보기';
        }
    });

    function restartGame() {
        gtag('event', 'game_restart', { 'game_title': gameTitles[currentGameFile] });
        const frame = document.getElementById('game_frame');
        frame.classList.remove('blurred');
        frame.src = frame.src;
        closeOverlay();
    }

    function closeOverlay() {
        document.getElementById('overlay_container').style.display = 'none';
        document.getElementById('game_frame').classList.remove('blurred');
    }
</script>
</body>
</html>
