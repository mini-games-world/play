<!DOCTYPE html>
<html lang="ko">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','G-KVQKN24VP5');</script>
    
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-KVQKN24VP5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', 'G-KVQKN24VP5', {'debug_mode': true});
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Mini Game Zone 🎮</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background: #eee; }
        header { background: #333; color: white; padding: 0.8rem; text-align: center; flex-shrink: 0; font-weight: bold; z-index: 20; font-size: 1.1rem; }
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        nav { width: 220px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; overflow-y: auto; }
        nav h3 { margin-top: 5px; font-size: 1rem; color: #555; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 10px; }
        .menu-list { display: flex; flex-direction: column; gap: 8px; }
        nav button { width: 100%; padding: 12px; cursor: pointer; border: 1px solid #eee; background: white; border-radius: 10px; transition: 0.2s; font-size: 0.95rem; text-align: left; }
        nav button:hover { background: #007bff; color: white; }
        
        #content_area { flex: 1; position: relative; background: #fff; }
        #welcome_screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; z-index: 5; text-align: center; padding: 20px; }
        .game-view { width: 100%; height: 100%; border: none; z-index: 1; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            nav { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; padding: 10px; overflow-y: hidden; }
            nav h3 { display: none; }
            .menu-list { flex-direction: row; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            nav button { width: auto; white-space: nowrap; padding: 10px 18px; }
        }
    </style>
</head>
<body>
    <header>🎮 Mini Game Zone</header>
    <div class="main-container">
        <nav>
            <h3>Game List</h3>
            <div class="menu-list">
                <button onclick="changeGame('Bunny Up.html')">Bunny Up</button>
                <button onclick="changeGame('Pop Orb.html')">Pop Orb</button>
                <button onclick="changeGame('Spike Guardian.html')">Spike Guardian</button>
                <button onclick="changeGame('Mine Hole.html')">Mine Hole</button>
                <button onclick="changeGame('Rail Run.html')">Rail Run</button>
            </div>
        </nav>
        <div id="content_area">
            <div id="welcome_screen">
                <h2>🕹️ Mini Game Zone 🕹️</h2>
                <p>Choose a game to play!</p>
            </div>
            <iframe src="" name="game_frame" id="game_frame" class="game-view"></iframe>
        </div>
    </div>

    <script>
        let gameStartTime = 0;
        let currentGameFile = '';

        const gameTitles = {
            'Bunny Up.html': '🐰 Bunny Up',
            'Pop Orb.html': '🎈 Pop Orb',
            'spike_v13.html': '🐙 Spike Guardian',
            'Mine Hole.html': '🕳️ Mine Hole',
            'Rail Run.html': '🚃 Rail Run'
        };

        function changeGame(fileName) {
            currentGameFile = fileName;

            // GA4 이벤트 로그: 게임 선택
            gtag('event', 'game_select', {
                'game_title': gameTitles[fileName] || 'Unknown Game', 
                'file_name': fileName   
            });

            document.getElementById('welcome_screen').style.display = 'none';
            const frame = document.getElementById('game_frame');
            frame.src = fileName;
        }

        // 게임 내 메시지 수신 (로그 분석용 유지)
        window.addEventListener('message', function(event) {
            const data = event.data; 
            const now = Date.now();
            const currentGameTitle = gameTitles[currentGameFile] || 'No game selected';

            if (data.type === 'GAME_START' || data.type === 'GAME_ACTUAL_START') {
                gameStartTime = now;
                gtag('event', 'game_start', { 'game_title': currentGameTitle });
            }
            
            if (data.type === 'GAME_OVER' || data.type === 'GAME_CLEAR') {
                const currentScore = data.score;
                const playTimeSec = gameStartTime > 0 ? Math.floor((now - gameStartTime) / 1000) : 0;
                const result = (data.type === 'GAME_CLEAR') ? 'success' : 'fail';
                
                // GA4 이벤트 로그: 게임 종료 결과만 기록
                gtag('event', 'game_end', {
                    'game_title': currentGameTitle,
                    'play_time_sec': playTimeSec,
                    'result': result,
                    'score': currentScore
                });

                if (playTimeSec > 0 && playTimeSec <= 10) {
                    gtag('event', 'game_early_leave', { 
                        'game_title': currentGameTitle, 
                        'play_time_sec': playTimeSec 
                    });
                }
                

            }
        });
    </script>
</body>
</html>
