<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbix 2026: Complete Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; touch-action: none; user-select: none; }
        #game-box { position: relative; width: 712px; height: 852px; max-width: 100vw; max-height: 100vh; background: #000; overflow: hidden; border: 1px solid #111; }
        canvas { width: 100%; height: 100%; display: block; object-fit: contain; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white; padding: 40px; box-sizing: border-box; }
        #cd-num { font-size: 150px; color: #00f2ff; margin: 10px 0; }
        #name-input { background: #111; border: 2px solid #333; color: #fff; padding: 15px; font-size: 24px; width: 80%; text-align: center; border-radius: 10px; outline: none; text-transform: uppercase; margin: 20px 0; user-select: text !important; }
        .btn { background: #00f2ff; border: none; color: #000; padding: 22px 60px; font-size: 26px; font-weight: bold; border-radius: 60px; cursor: pointer; margin-top: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; font-size: 18px; width: 100%; }
    </style>
</head>
<body>

<div id="game-box">
    <canvas id="gameCanvas"></canvas>
    <div id="countdown-ui" class="overlay"><p style="font-size:22px;">MOVE THE JOYSTICK TO SHOOT!</p><div id="cd-num">3</div><p style="color:#f1c40f; font-weight:bold;">BREAK THE RECORD!</p></div>
    <div id="naming-ui" class="overlay" style="display: none;"><h1 style="color:#f1c40f;">NEW RECORD!</h1><input type="text" id="name-input" placeholder="NAME" maxlength="10"><button class="btn" onclick="finishGame()">SUBMIT</button></div>
    <div id="rank-ui" class="overlay" style="display: none;"><h1>RANKING</h1><div id="rank-board" style="width:100%; text-align:left; margin:20px 0;"></div><button class="btn" onclick="location.reload()">TRY AGAIN</button></div>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    const W = 712, H = 852;
    canvas.width = W; canvas.height = H;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null, audioEnabled = true;

    function playSFX(type) {
        if (!audioEnabled) return;
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const playTone = (freq, start, duration, type='sine', vol=0.1) => {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(vol, start); gain.gain.exponentialRampToValueAtTime(0.001, start+duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(start); osc.stop(start+duration);
        };
        if (type === 'countdown') playTone(800, now, 0.1);
        else if (type === 'start') { playTone(400, now, 0.3, 'triangle', 0.15); playTone(1200, now+0.05, 0.3, 'triangle', 0.1); }
        else if (type === 'clear') { playTone(523, now, 0.2); playTone(659, now+0.1, 0.2); playTone(784, now+0.2, 0.4); }
        else if (type === 'death') { 
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(40, now+0.8);
            gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now+0.8);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.8);
        }
    }

    let state = 'COUNTDOWN', totalScore = 0, roundScore = 0, round = 0, targetScore = 2500, frame = 0, timeSlow = 0, timeFreeze = 0, clearTimer = 0;
    let player = { x: W/2, y: H/2, r: 24, angle: 0, targetAngle: 0, color: '#00f2ff', double: 0 };
    let enemies = [], bullets = [], items = [], particles = [], shockwaves = [], firePatches = [];
    const joystick = { baseX: W/2, baseY: H - 120, baseR: 70, knobR: 35, knobX: W/2, knobY: H - 120, active: false, angle: 0 };
    const dynamicHighScore = Math.floor(Math.random() * 10000) + 72450;

    window.onload = () => {
        let count = 3;
        playSFX('countdown');
        const itv = setInterval(() => {
            count--;
	if(count <= 0) { clearInterval(itv); document.getElementById('countdown-ui').style.display='none'; if(audioEnabled) bgm.play().catch(()=>{}); playSFX('start'); initRound(); state='PLAYING'; window.parent.postMessage({ type: 'GAME_START' }, '*'); }
            else { document.getElementById('cd-num').innerText = count; playSFX('countdown'); }
        }, 1000);
        requestAnimationFrame(mainLoop);
    };

    function initRound() { round++; roundScore = 0; targetScore = 1500 + (round * 1500); enemies = []; bullets = []; items = []; particles = []; shockwaves = []; firePatches = []; frame = 0; }

    function mainLoop() {
        if (state === 'PLAYING') {
            update(); frame++;
            if (Math.random() < 0.08 + (round * 0.015)) spawnEnemy();
            if (round >= 3 && Math.random() < 0.007) spawnItem();
            if (roundScore >= targetScore) startClearTransition();
        } else if (state === 'CLEAR_TRANSITION') { update(); clearTimer--; if (clearTimer <= 0) { initRound(); state = 'PLAYING'; playSFX('start'); } }
        draw();
        requestAnimationFrame(mainLoop);
    }

    function spawnEnemy() {
        const dist = 550, ang = Math.random() * Math.PI * 2;
        let x = W/2 + Math.cos(ang) * dist, y = H/2 + Math.sin(ang) * dist;
        let type = 'white', hp = 1, r = 18, color = '#ffffff', rand = Math.random();
        let bp = (round >= 8) ? 0.45 : 1.0;
        if (round >= 10 && rand < 0.05) { type = 'rainbow'; r = 35; color = 'rainbow'; }
        else if (round >= 9 && rand < 0.06) { type = 'silver'; hp = 25; r = 24; color = '#bdc3c7'; }
        else if (round >= 8 && rand < 0.06) { type = 'pink'; hp = 20; r = 32; color = '#ff80ab'; }
        else if (round >= 7 && rand < 0.06 * bp) { type = 'ice'; hp = 15; r = 28; color = '#a2edff'; }
        else if (round >= 6 && rand < 0.06 * bp) { type = 'orange'; hp = 12; r = 26; color = '#ff9f43'; }
        else if (round >= 5 && rand < 0.08 * bp) { type = 'green'; hp = 10; r = 25; color = '#2ecc71'; }
        else if (round >= 4 && rand < 0.07 * bp) { type = 'yellow'; hp = 10; r = 25; color = '#f1c40f'; }
        else if (round >= 2 && rand < 0.05) { type = 'purple'; hp = 6; r = 26; color = '#e056fd'; }
        else if (rand < 0.15 * bp) { type = 'blue'; hp = 14; r = 32; color = '#2979ff'; }
        else if (rand < 0.30) { type = 'red'; hp = 4; r = 24; color = '#ff1744'; }
        enemies.push({ x, y, r, hp, type, color, timer: 180, speed: 1.1 + (round * 0.1), dead: false });
    }

    function spawnItem() { const ang = Math.random() * Math.PI * 2; items.push({ x: W/2 + Math.cos(ang)*500, y: H/2 + Math.sin(ang)*500, r: 25, type: 'double' }); }

    function update() {
        if (timeSlow > 0) timeSlow--; if (timeFreeze > 0) timeFreeze--; if (player.double > 0) player.double--;
        if (joystick.active) {
            player.targetAngle = joystick.angle;
            let ad = player.targetAngle - player.angle;
            while (ad < -Math.PI) ad += Math.PI * 2; while (ad > Math.PI) ad -= Math.PI * 2;
            player.angle += ad * 0.15; // Sensitivity: 0.15
            if (state === 'PLAYING' && frame % 2 === 0) { if (player.double > 0) { shoot(player.angle-0.15); shoot(player.angle+0.15); } else shoot(player.angle); }
        }
        bullets.forEach(b => { b.x += b.vx; b.y += b.vy; if (b.x < -100 || b.x > W+100 || b.y < -100 || b.y > H+100) b.dead = true; });
        bullets = bullets.filter(b => !b.dead);
        items.forEach(it => { const a = Math.atan2(H/2-it.y, W/2-it.x); it.x += Math.cos(a)*1.5; it.y += Math.sin(a)*1.5; bullets.forEach(b => { if (Math.hypot(b.x-it.x, b.y-it.y) < it.r + 10) { it.dead = true; b.dead = true; player.double = 300; addScore(100); }}); });
        items = items.filter(it => !it.dead);
        firePatches.forEach(f => { f.life--; enemies.forEach(e => { if(Math.hypot(e.x-f.x, e.y-f.y) < f.r) { e.hp -= 0.12; if(e.hp <= 0) { e.dead=true; onKill(e); }}}); });
        firePatches = firePatches.filter(f => f.life > 0);
        const newSpawn = [];
        enemies.forEach(e => {
            if (timeFreeze <= 0) { const ms = (timeSlow > 0) ? e.speed * 0.22 : e.speed; const a = Math.atan2(H/2 - e.y, W/2 - e.x); e.x += Math.cos(a) * ms; e.y += Math.sin(a) * ms; }
            if (e.type === 'purple') { e.timer--; if (e.timer <= 0) { e.dead = true; for(let k=0; k<6; k++) newSpawn.push({ x: e.x+(Math.random()-0.5)*40, y: e.y+(Math.random()-0.5)*40, r:16, hp:1, type:'white', color:'#fff', speed:1.8, dead:false }); }}
            if (state === 'PLAYING' && Math.hypot(e.x-player.x, e.y-player.y) < player.r + e.r - 10) endGame();
            bullets.forEach(b => { if (!e.dead && !b.dead && Math.hypot(b.x-e.x, b.y-e.y) < e.r + 10) { e.hp--; if (!b.pierce) b.dead = true; if (e.type === 'silver') addScore(25); if (e.hp <= 0) { e.dead = true; onKill(e); }}});
        });
        enemies = enemies.filter(e => !e.dead).concat(newSpawn);
        shockwaves.forEach(sw => { sw.r += 18; sw.a *= 0.92; }); shockwaves = shockwaves.filter(sw => sw.a > 0.05);
        particles.forEach(p => { p.life -= 0.05; if (p.life <= 0) p.dead = true; }); particles = particles.filter(p => !p.dead);
    }

    function onKill(e) {
        addScore(e.type === 'white' ? 10 : 50);
        for(let i=0; i<5; i++) particles.push({ x: e.x, y: e.y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, c: (e.color==='rainbow'?'#fff':e.color), life:1 });
        if (e.type === 'blue') { shockwaves.push({ x: e.x, y: e.y, r: 10, a: 1, c: '#2979ff' }); enemies.forEach(en => { if (Math.hypot(en.x-e.x, en.y-e.y) < 400) { en.dead = true; addScore(20); }}); }
        if (e.type === 'yellow') { for(let i=0; i<16; i++) { const a = (Math.PI*2/16)*i; bullets.push({ x: e.x, y: e.y, vx: Math.cos(a)*22, vy: Math.sin(a)*22, dead: false, pierce: true }); } }
        if (e.type === 'green') timeSlow = 240;
        if (e.type === 'orange') firePatches.push({ x: e.x, y: e.y, r: 160, life: 180 });
        if (e.type === 'ice') { timeFreeze = 120; shockwaves.push({ x:W/2, y:H/2, r: 10, a: 1, c: '#a2edff' }); }
        if (e.type === 'rainbow') { enemies.forEach(en => { en.dead = true; addScore(100); }); shockwaves.push({ x: W/2, y: H/2, r: 10, a: 1, c: '#fff' }); }
    }

    function shoot(a) { bullets.push({ x: player.x+Math.cos(a)*30, y: player.y+Math.sin(a)*30, vx: Math.cos(a)*26, vy: Math.sin(a)*26, dead: false }); }
    function addScore(p) { totalScore += p; roundScore += p; }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
        if (timeSlow > 0) { ctx.save(); ctx.strokeStyle = 'rgba(46, 204, 113, 0.4)'; ctx.lineWidth = 40; ctx.strokeRect(0, 0, W, H); const grad = ctx.createRadialGradient(W/2, H/2, W/4, W/2, H/2, W); grad.addColorStop(0, 'rgba(46, 204, 113, 0)'); grad.addColorStop(1, 'rgba(46, 204, 113, 0.15)'); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H); ctx.restore(); }
        firePatches.forEach(f => { ctx.fillStyle = 'rgba(255, 159, 67, 0.35)'; ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 7); ctx.fill(); });
        shockwaves.forEach(sw => { ctx.globalAlpha = sw.a; ctx.strokeStyle = sw.c; ctx.lineWidth = 15; ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, 7); ctx.stroke(); }); ctx.globalAlpha = 1;
        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 5, 5); }); ctx.globalAlpha = 1;
        bullets.forEach(b => { ctx.fillStyle = b.pierce ? '#f1c40f' : '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); });
        items.forEach(it => { ctx.fillStyle = '#fff'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center'; ctx.fillText('+', it.x, it.y+12); });
        enemies.forEach(e => {
            if (e.color === 'rainbow') { let g = ctx.createLinearGradient(e.x-e.r, e.y, e.x+e.r, e.y); g.addColorStop(0, 'red'); g.addColorStop(1, 'blue'); ctx.fillStyle = g; } else { ctx.fillStyle = e.color; }
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 7); ctx.fill();
            if (e.type !== 'white' && e.type !== 'red') { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
            if (e.type === 'purple') { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y, e.r+6, 0, (Math.PI*2)*(e.timer/180)); ctx.stroke(); }
        });
        ctx.save(); ctx.translate(W/2, H/2); ctx.rotate(player.angle); ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(0, 0, player.r, 0, 7); ctx.fill(); ctx.fillStyle = '#fff'; ctx.fillRect(15, -9, 35, 18); ctx.restore();
        if (state === 'PLAYING') { ctx.globalAlpha = 0.3; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(joystick.baseX, joystick.baseY, joystick.baseR, 0, 7); ctx.fill(); ctx.globalAlpha = 0.7; ctx.beginPath(); ctx.arc(joystick.knobX, joystick.knobY, joystick.knobR, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }

        // --- INTERNAL CANVAS UI ---
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "900 85px 'Arial Black'"; ctx.fillText(totalScore.toLocaleString(), W/2, 85);
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 16px Arial"; ctx.fillText("GOAL: " + Math.max(0, targetScore - roundScore).toLocaleString() + " LEFT", W/2, 125);
        ctx.fillStyle = "#00f2ff"; ctx.font = "bold 16px Arial"; ctx.textAlign = "left"; ctx.fillText("ROUND " + round, 20, 40);
        ctx.fillStyle = "#f1c40f"; ctx.textAlign = "right"; ctx.font = "12px Arial"; ctx.fillText("TOP RANKER", W-20, 35); ctx.fillStyle = "#fff"; ctx.font = "bold 14px Arial"; ctx.fillText("Elite_Miner", W-20, 55); ctx.fillStyle = "#f1c40f"; ctx.font = "bold 18px Arial"; ctx.fillText(dynamicHighScore.toLocaleString(), W-20, 75);

        if (round === 1 && frame > 120 && frame < 360) { ctx.fillStyle = "#00f2ff"; ctx.textAlign = "center"; ctx.font = "bold 24px Arial"; ctx.fillText("DESTROY BLUE BALLS FOR EXPLOSION!", W/2, H-220); }

        if (state === 'CLEAR_TRANSITION') {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,W,H);
            ctx.fillStyle = "#f1c40f"; ctx.textAlign = "center"; ctx.font = "bold 50px Arial"; ctx.fillText("ROUND CLEAR", W/2, H/2 - 80);
            
            // --- RESTORED DESCRIPTION LOGIC ---
            const descs = ["", "PURPLE BALLS MULTIPLY!", "DOUBLE SHOT UNLOCKED!", "YELLOW BARRAGE BALLS!", "GREEN SLOW-MO BALLS!", "ORANGE FIRE BALLS!", "ICE FREEZE BALLS!", "PINK BLACKHOLE BALLS!", "SILVER SCORE GEMS!", "RAINBOW NUKE JACKPOT!"];
            ctx.fillStyle = "#fff"; ctx.font = "bold 22px Arial"; ctx.fillText("NEW UNLOCKED:", W/2, H/2 - 20);
            ctx.fillStyle = "#00f2ff"; ctx.font = "bold 28px Arial"; ctx.fillText(descs[round] || "DIFFICULTY UP!", W/2, H/2 + 25);
            
            ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "bold 20px Arial"; ctx.fillText("NEXT ROUND IN " + Math.ceil(clearTimer/60) + "...", W/2, H/2 + 90);
        }
    }

    function startClearTransition() { state = 'CLEAR_TRANSITION'; playSFX('clear'); clearTimer = 180; joystick.active = false; joystick.knobX = joystick.baseX; joystick.knobY = joystick.baseY; }
function endGame() { if(state==='GAMEOVER')return; state = 'GAMEOVER'; playSFX('death'); window.parent.postMessage({ type: 'GAME_OVER', score: totalScore }, '*'); if (totalScore >= dynamicHighScore) document.getElementById('naming-ui').style.display = 'flex'; else showFinalRanking(false); }
    function finishGame() { document.getElementById('naming-ui').style.display = 'none'; showFinalRanking(true); }
    function showFinalRanking(surpassed) {
        document.getElementById('rank-ui').style.display = 'flex';
        const name = (document.getElementById('name-input')?.value || "YOU").toUpperCase();
        let board = document.getElementById('rank-board');
        const score1 = Math.max(totalScore + 150, dynamicHighScore + 1200);
        board.innerHTML = `<div class="rank-item"><span>1. Mega_Digger</span><span>${score1}</span></div>
                           <div class="rank-item me"><span>2. ${surpassed?name:'Elite_Miner'}</span><span>${surpassed?totalScore:dynamicHighScore}</span></div>
                           <div class="rank-item"><span>3. ${surpassed?'Elite_Miner':name}</span><span>${surpassed?dynamicHighScore:totalScore}</span></div>`;
    }

    function handleTouch(e) {
        if (state !== 'PLAYING') return;
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const r = canvas.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX - r.left) * (W / r.width);
        const cy = (e.touches ? e.touches[0].clientY : e.clientY - r.top) * (H / r.height);
        const dx = cx - joystick.baseX, dy = cy - joystick.baseY, dist = Math.hypot(dx, dy);
        if (dist < joystick.baseR * 2.5 || joystick.active) {
            joystick.active = true; joystick.angle = Math.atan2(dy, dx);
            joystick.knobX = joystick.baseX + Math.cos(joystick.angle) * Math.min(dist, joystick.baseR);
            joystick.knobY = joystick.baseY + Math.sin(joystick.angle) * Math.min(dist, joystick.baseR);
        }
        if (e.cancelable) e.preventDefault();
    }
    window.addEventListener('touchstart', e => handleTouch(e), {passive: false});
    window.addEventListener('touchmove', e => handleTouch(e), {passive: false});
    window.addEventListener('touchend', () => { joystick.active = false; joystick.knobX = joystick.baseX; joystick.knobY = joystick.baseY; });
    window.addEventListener('mousedown', e => { if(state==='PLAYING'){joystick.active=true; handleTouch(e);}});
    window.addEventListener('mousemove', e => { if(joystick.active) handleTouch(e); });
    window.addEventListener('mouseup', () => { joystick.active = false; joystick.knobX = joystick.baseX; joystick.knobY = joystick.baseY; });
</script>
</body>
</html>
