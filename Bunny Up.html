<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rabbit Turbo Sky Rush: Ultimate Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background: #000; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; font-family: 'Nunito', sans-serif; 
            touch-action: none;
        }
        
        /* [규격] 712*852 Fixed Ratio Container */
        #gameWrapper { 
            position: relative; 
            width: 100vw; 
            height: calc(100vw * (852 / 712));
            max-width: 712px; 
            max-height: 852px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            background: #000;
            overflow: hidden; 
        }

        @media (min-aspect-ratio: 712/852) {
            #gameWrapper {
                height: 100vh;
                width: calc(100vh * (712 / 852));
            }
        }

        canvas { width: 100%; height: 100%; display: block; }
        
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; z-index: 100; padding: 20px;
        }
        .hidden { display: none !important; }
        
        #startOverlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); color: white; }
        .item-guide {
            background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 20px;
            margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            text-align: left; font-size: 15px; border: 1px solid rgba(255,255,255,0.2);
        }

        #countdown { font-size: 100px; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.8); }

        /* Ranking UI */
        #deadOverlay, #rankOverlay, #resultOverlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); color: white; z-index: 200; }
        .card { background: white; color: #333; border-radius: 32px; padding: 30px; width: 90%; max-width: 400px; text-align: center; pointer-events: auto; }
        .btn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; padding: 16px 0; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 20px; width: 100%; margin-top: 15px; pointer-events: auto; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 2px solid #ddd; font-size: 18px; text-align: center; outline: none; -webkit-user-select: text; user-select: text; }

        /* Controls */
        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none; z-index: 20; }
        .ctrl-btn { width: 85px; height: 85px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; font-size: 35px; color: white; display: flex; justify-content: center; align-items: center; pointer-events: auto; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <audio id="bgm" loop preload="auto"><source src="Top_Floor_Access.mp3" type="audio/mpeg"></audio>
        <canvas id="gameCanvas" width="712" height="852"></canvas>
        
        <div id="startOverlay" class="overlay">
            <h1 style="font-size: 48px; font-weight: 900; margin-bottom: 20px;">SKY RUSH</h1>
            <div class="item-guide">
                <div><span>🍄</span> Mushroom (Boost)</div>
                <div><span>🛡️</span> Shield (Protect)</div>
                <div><span>🤢</span> Poison (Slow)</div>
                <div><span>🌟</span> Fever (Rush!)</div>
            </div>
            <button id="startBtn" class="btn" style="width: 200px;">START GAME 🎵</button>
            <div id="countdown" class="hidden">3</div>
        </div>

        <div id="rankOverlay" class="overlay hidden">
            <div class="card">
                <h2 style="color: #ff9f43; font-size: 28px;">NEW RECORD!</h2>
                <p>Register your score to World Ranking!</p>
                <input type="text" id="nickInput" placeholder="Enter Nickname" maxlength="10">
                <button id="submitBtn" class="btn">REGISTER</button>
            </div>
        </div>

        <div id="resultOverlay" class="overlay hidden">
            <div class="card">
                <h2 style="font-size: 24px;">WORLD RANKING</h2>
                <div id="rankList" style="margin: 20px 0; font-weight: 700; text-align: left;"></div>
                <button id="retryBtn" class="btn">RETRY 🐰</button>
            </div>
        </div>

        <div id="deadOverlay" class="overlay hidden">
            <div class="card">
                <h1 style="color: #ff4757; font-size: 36px;">CRASHED!</h1>
                <p id="finalScoreText" style="font-size: 24px; font-weight: 700;">Score: 0</p>
                <button id="failRetryBtn" class="btn">RETRY</button>
            </div>
        </div>

        <div id="controls">
            <div id="leftBtn" class="ctrl-btn">◀</div>
            <div id="rightBtn" class="ctrl-btn">▶</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bgm = document.getElementById("bgm");

const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const speedMult = isMobile ? 0.75 : 1.0; 

const BASE_GRAVITY = 0.78 * speedMult;     
const BASE_JUMP_STR = -24 * speedMult;     
const BASE_PLAYER_SPEED = isMobile ? 11.8 : 10.5; 

let player, platforms, items, enemies, rainbowTrail, bgStars, score, gameOver, keys;
let isCounting = true, frameCount = 0, shake = 0;
let feverMode = false, feverTimer = 0, poisonMode = false, poisonTimer = 0, hasShield = false;
let currentStage = 1, invincibleTimer = 0;

// [규격] 라이벌 시스템
let rivalName = "ProLeaper_99";
let rivalScore = Math.floor(Math.random() * 5000) + 6000;

const stageThemes = {
    1: { name: "Pink Candy Sky", bg: ['#ff9a9e', '#fecfef', '#fbc2eb'], starColor: '#ffffff', cloudColor: '#ffffff', minScore: 0 },
    2: { name: "Twilight Night", bg: ['#1e3c72', '#2a5298', '#6a11cb'], starColor: '#b3e5fc', cloudColor: '#E0F2FE', minScore: 5000 },
    3: { name: "Sunset Desert", bg: ['#e65100', '#fb8c00', '#f4d03f'], starColor: '#fff9c4', cloudColor: '#fff9c4', minScore: 10000 },
    4: { name: "Deep Galaxy", bg: ['#0f0c29', '#302b63', '#24243e'], starColor: '#e1bee7', cloudColor: '#ede7f6', minScore: 15000 }
};

document.getElementById("startBtn").onclick = () => {
    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("countdown").classList.remove("hidden");
    bgm.play().catch(() => {});
    initGame();
};

function initGame() {
    currentStage = 1;
    player = { x: 328, y: 700, w: 55, h: 55, dy: 0, life: 1 };
    platforms = []; items = []; enemies = []; rainbowTrail = [];
    score = 0; gameOver = false; feverMode = false; poisonMode = false; hasShield = false; invincibleTimer = 0;
    keys = { left: false, right: false };
    
    bgStars = Array.from({length: 50}, () => ({ 
        x: Math.random() * 712, y: Math.random() * 852, 
        r: Math.random() * 2.2 + 0.5, phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.03 + Math.random() * 0.03
    }));

    platforms.push({ x: 280, y: 780, w: 150, h: 32, color: '#ffffff', isPermanent: true, opacity: 1, isFading: false });
    let currentY = 780;
    for (let i = 0; i < 9; i++) { 
        currentY -= 175; 
        spawnPlatform(currentY); 
    }
    startCountdown();
}

function startCountdown() {
    isCounting = true;
    let count = 3;
    const el = document.getElementById("countdown");
    el.innerText = count;
    const timer = setInterval(() => {
        count--;
        if (count > 0) el.innerText = count;
        else { 
            clearInterval(timer); 
            document.getElementById("startOverlay").classList.add("hidden"); 
            isCounting = false; 
            animate(); 
	window.parent.postMessage({ type: 'GAME_START' }, '*'); 
        }
    }, 1000);
}

function spawnPlatform(y) {
    const diff = Math.floor(score / 2000);
    let theme = stageThemes[score >= 15000 ? 4 : score >= 10000 ? 3 : score >= 5000 ? 2 : 1];
    let minW = Math.max(140 - (diff * 9), 75);
    let w = minW + Math.random() * 45;
    let x = Math.random() * (canvas.width - w);
    platforms.push({ x, y, w, h: 32, color: theme.cloudColor, isPermanent: false, opacity: 1, isFading: false });

    let rand = Math.random();
    if (rand < 0.075) items.push({ x: x + w/2 - 25, y: y - 45, w: 50, h: 50, type: 'mushroom' });
    else if (rand < 0.115) items.push({ x: x + w/2 - 25, y: y - 45, w: 50, h: 50, type: 'shield' });

    if (score > 500 && Math.random() < Math.min(0.04 + (diff * 0.07), 0.75)) {
        let baseBirdVX = 5.0 + (diff * 1.3);
        enemies.push({ x: Math.random() > 0.5 ? -100 : canvas.width + 100, y: y - 80, vx: (Math.random() > 0.5 ? baseBirdVX : -baseBirdVX) * speedMult, w: 60, h: 60 });
    }
}

function handleHitOrFall() {
    if (hasShield) { hasShield = false; invincibleTimer = 100; return; }
    if (player.life > 0) {
        player.life--; invincibleTimer = 180; player.dy = -100 * speedMult; shake = 30; poisonMode = false;
    } else {
        triggerGameOver();
    }
}

function triggerGameOver() { 
    if(gameOver) return; 
    gameOver = true; 
    bgm.pause();
	window.parent.postMessage({ type: 'GAME_OVER', score: score }, '*'); 

    // [랭킹 로직]
    if (score > rivalScore) {
        document.getElementById("rankOverlay").classList.remove("hidden");
    } else {
        document.getElementById("finalScoreText").innerText = `Score: ${score.toLocaleString()}`;
        document.getElementById("deadOverlay").classList.remove("hidden");
    }
}

document.getElementById("submitBtn").onclick = () => {
    let userNick = document.getElementById("nickInput").value || "Player";
    document.getElementById("rankOverlay").classList.add("hidden");
    document.getElementById("resultOverlay").classList.remove("hidden");
    
    // [규격] 추월해도 1위 아닌 연출
    const sneakyBossScore = score + Math.floor(Math.random() * 200) + 100;
    rivalName = "GodOfJumping";
    rivalScore = sneakyBossScore; // 다음 판 타겟 갱신

    document.getElementById("rankList").innerHTML = `
        <div style="color: #ff4757; margin-bottom: 10px;">1. ${rivalName} - ${rivalScore.toLocaleString()} pts</div>
        <div style="color: #4facfe; margin-bottom: 10px;">2. ${userNick} (YOU) - ${score.toLocaleString()} pts</div>
        <div style="color: #888; margin-bottom: 10px;">3. ProLeaper_99 - ${(score-300).toLocaleString()} pts</div>
    `;
};

const resetToStart = () => {
    document.getElementById("resultOverlay").classList.add("hidden");
    document.getElementById("deadOverlay").classList.add("hidden");
    document.getElementById("startOverlay").classList.remove("hidden");
    document.getElementById("startBtn").classList.remove("hidden");
    document.getElementById("countdown").classList.add("hidden");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};

document.getElementById("retryBtn").onclick = resetToStart;
document.getElementById("failRetryBtn").onclick = resetToStart;

function animate() {
    if (gameOver || isCounting) return;
    frameCount++;
    if (invincibleTimer > 0) invincibleTimer--;
    if (poisonTimer > 0) { poisonTimer--; if (poisonTimer <= 0) poisonMode = false; }

    const speedBonus = Math.min(score / 100000, 0.3) * speedMult; 
    let currentGravity = BASE_GRAVITY + speedBonus;
    let currentJumpStr = BASE_JUMP_STR - (speedBonus * 7);
    let currentPlayerSpeed = BASE_PLAYER_SPEED + (speedBonus * 8);

    if (poisonMode) { currentJumpStr = -12 * speedMult; currentPlayerSpeed *= 0.6; }

    if (keys.left) player.x -= currentPlayerSpeed;
    if (keys.right) player.x += currentPlayerSpeed;
    if (player.x < 0) player.x = 0; if (player.x > canvas.width - player.w) player.x = canvas.width - player.w; 

    player.dy += currentGravity; player.y += player.dy;

    if (feverMode) { feverTimer--; player.dy = Math.min(player.dy, -55 * speedMult); if (feverTimer <= 0) feverMode = false; }

    if (player.y < 350) {
        let diff = 350 - player.y; player.y = 350; score += Math.floor(diff * 0.3);
        platforms.forEach(p => p.y += diff); items.forEach(it => it.y += diff);
        enemies.forEach(en => en.y += diff); rainbowTrail.forEach(rt => rt.y += diff);
        bgStars.forEach(s => { s.y = (s.y + diff * 0.45) % 852; });
    }

    let highestY = Math.min(...platforms.map(p => p.y));
    while (highestY > -150) { highestY -= 155; spawnPlatform(highestY); }

    enemies.forEach((en, i) => {
        en.x += en.vx;
        if (player.x + 12 < en.x + en.w && player.x + player.w - 12 > en.x && player.y + 12 < en.y + en.h && player.y + player.h - 12 > en.y) {
            if (feverMode || player.dy < -30 * speedMult) enemies.splice(i, 1); 
            else if (invincibleTimer <= 0) handleHitOrFall();
        }
        if (en.x > canvas.width + 250 || en.x < -250) enemies.splice(i, 1);
    });

    if (player.y > canvas.height) handleHitOrFall();

    if (player.dy > 0 || feverMode || player.dy < -30 * speedMult) {
        items.forEach((it, i) => {
            if (player.x + player.w * 0.8 > it.x && player.x + player.w * 0.2 < it.x + it.w && player.y + player.h > it.y && player.y < it.y + it.h + 20) {
                if (it.type === 'mushroom') { player.dy = Math.min(player.dy - 40 * speedMult, -95 * speedMult); items.splice(i, 1); poisonMode = false; }
                else if (it.type === 'shield') { hasShield = true; items.splice(i, 1); }
            }
        });
        if (!feverMode && player.dy > 0) {
            platforms.forEach(p => {
                if (!p.isFading && player.x + player.w * 0.7 > p.x && player.x + player.w * 0.3 < p.x + p.w && player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy + 8) {
                    player.dy = currentJumpStr; player.y = p.y - player.h; if (!p.isPermanent) p.isFading = true;
                }
            });
        }
    }
    platforms.forEach((p, i) => { if (p.isFading) { p.opacity -= 0.05; if (p.opacity <= 0) platforms.splice(i, 1); } });
    if (player.dy < -20 * speedMult || feverMode) rainbowTrail.push({ x: player.x + player.w/2, y: player.y + player.h/2, w: player.w, h: player.h, life: 1.0, isFever: feverMode, isPoison: poisonMode, offset: frameCount });
    rainbowTrail.forEach((rt, i) => { rt.life -= 0.04; if (rt.life <= 0) rainbowTrail.splice(i, 1); });
    draw(); requestAnimationFrame(animate);
}

function drawCloud(ctx, x, y, w, color, opacity) {
    ctx.save(); ctx.globalAlpha = opacity; ctx.fillStyle = color;
    const parts = [{dx: 0.15, dy: 15, r: 24}, {dx: 0.35, dy: 5, r: 32}, {dx: 0.55, dy: 10, r: 28}, {dx: 0.75, dy: 18, r: 24}, {dx: 0.45, dy: 22, r: 26}];
    parts.forEach(p => { ctx.beginPath(); ctx.arc(x + w * p.dx, y + p.dy, p.r, 0, Math.PI * 2); ctx.fill(); });
    ctx.globalAlpha = opacity * 0.6; ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x + w * 0.4, y + 10, 18, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.shadowBlur = 0; ctx.globalAlpha = 1.0; ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (shake > 0) { ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2); shake *= 0.9; }
    ctx.save();
    let theme = stageThemes[score >= 10000 ? 3 : score >= 5000 ? 2 : 1];
    const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, theme.bg[0]); skyGrad.addColorStop(1, theme.bg[2]);
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
    ctx.save();
    bgStars.forEach(s => {
        const twinkle = Math.abs(Math.sin(frameCount * s.twinkleSpeed + s.phase));
        ctx.fillStyle = 'white'; ctx.globalAlpha = twinkle * 0.7 + 0.2; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }); ctx.restore();
    rainbowTrail.forEach(rt => {
        ctx.save(); ctx.globalAlpha = rt.life * 0.5;
        ctx.fillStyle = rt.isFever ? 'gold' : '#ff4757';
        ctx.fillText("🐰", rt.x - rt.w/2, rt.y + rt.h/2 + 55); ctx.restore();
    });
    platforms.forEach(p => drawCloud(ctx, p.x, p.y, p.w, p.color, p.opacity));
    ctx.save(); items.forEach(it => { 
        ctx.font = "42px Arial";
        ctx.fillText(it.type === 'mushroom' ? "🍄" : "🛡️", it.x, it.y + 42); 
    }); ctx.restore();
    enemies.forEach(en => { ctx.font = "58px Arial"; ctx.fillText("🐦", en.x, en.y + 50); });
    ctx.save(); ctx.font = "65px Arial";
    if (invincibleTimer > 0) ctx.globalAlpha = 0.6;
    ctx.fillText("🐰", player.x, player.y + 55);
    if (hasShield) { ctx.strokeStyle = 'rgba(110, 198, 255, 0.8)'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(player.x + 27, player.y + 27, 48, 0, Math.PI * 2); ctx.stroke(); }
    ctx.restore();
    ctx.save(); ctx.fillStyle = "white"; ctx.font = "bold 22px Nunito"; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
    ctx.textAlign = "left"; ctx.fillText(`Score: ${score.toLocaleString()}`, 25, 45);
    ctx.fillText(player.life > 0 ? "❤️" : "🖤", 25, 75);
    ctx.textAlign = "right"; ctx.fillStyle = "#ffdea3"; 
    ctx.fillText(`${rivalName}`, canvas.width - 25, 45);
    ctx.font = "bold 18px Nunito";
    ctx.fillText(`Best: ${rivalScore.toLocaleString()}`, canvas.width - 25, 70);
    ctx.restore();
}

function setupControls() {
    const handleMove = (key, val) => (e) => { e.preventDefault(); keys[key] = val; };
    document.getElementById("leftBtn").addEventListener("touchstart", handleMove("left", true));
    document.getElementById("leftBtn").addEventListener("touchend", handleMove("left", false));
    document.getElementById("rightBtn").addEventListener("touchstart", handleMove("right", true));
    document.getElementById("rightBtn").addEventListener("touchend", handleMove("right", false));
    window.addEventListener("mousedown", (e) => { if(e.clientX < window.innerWidth/2) keys.left=true; else keys.right=true; });
    window.addEventListener("mouseup", () => { keys.left=false; keys.right=false; });
}
window.addEventListener("keydown", e => { if(e.code==="ArrowLeft") keys.left=true; if(e.code==="ArrowRight") keys.right=true; });
window.addEventListener("keyup", e => { if(e.code==="ArrowLeft") keys.left=false; if(e.code==="ArrowRight") keys.right=false; });
setupControls(); draw();
</script>
</body>
</html>
