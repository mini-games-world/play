<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hole War - Final Launch Version</title>
    <style>
        body { 
            margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; user-select: none; touch-action: none; 
        }
        canvas { display: block; }
        
        /* 인게임 UI */
        #ui {
            position: absolute; top: 15px; left: 15px; color: white;
            background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 12px;
            pointer-events: none; border: 1px solid #444; width: 180px; display: none;
        }
        #timerBox { font-size: 22px; color: #1dd1a1; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #555; padding-bottom: 8px; text-align: center;}
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 14px; font-weight: bold; }
        .rank-color { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        #controlsText { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.4; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 6px; text-align: center;}

        /* 메인 메뉴 & 매칭 화면 */
        #mainMenuScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 20;
        }
        #gameTitle { font-size: 64px; color: #ff9f43; margin-bottom: 30px; font-weight: bold; text-shadow: 0 0 20px rgba(255, 159, 67, 0.5); text-transform: uppercase; }
        
        /* 닉네임 입력창 */
        #playerNameInput {
            padding: 12px; font-size: 20px; text-align: center; border-radius: 8px;
            border: 2px solid #ff9f43; background: rgba(0,0,0,0.6); color: white;
            margin-bottom: 25px; width: 250px; font-weight: bold; outline: none;
            pointer-events: auto; box-sizing: border-box;
        }
        #playerNameInput:focus { border-color: #1dd1a1; background: rgba(0,0,0,0.8); }
        #playerNameInput:disabled { opacity: 0.5; cursor: not-allowed; }

        .actionBtn {
            padding: 15px 40px; font-size: 24px; color: #000; background: #1dd1a1;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; pointer-events: auto;
            transition: all 0.2s; width: 250px; text-align: center; box-sizing: border-box;
        }
        .actionBtn:hover { transform: scale(1.05); background: #10ac84; }
        .actionBtn:disabled { background: #555; color: #aaa; cursor: not-allowed; transform: none; }

        /* 게임 오버 화면 */
        #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 15;
        }
        #gameOverTitle { font-size: 52px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #finalRank { font-size: 22px; margin-bottom: 30px; color: #ccc; font-weight: bold; text-align: center;}

        @media (max-width: 600px) {
            #ui { padding: 10px 15px; width: 150px; }
            #timerBox { font-size: 18px; }
            .rank-item { font-size: 12px; }
            #gameTitle { font-size: 48px; }
            #gameOverTitle { font-size: 38px; }
            .actionBtn, #playerNameInput { font-size: 20px; width: 220px; }
        }
    </style>
</head>
<body>

<div id="mainMenuScreen">
    <div id="gameTitle">HOLE WAR</div>
    <input type="text" id="playerNameInput" placeholder="Enter Nickname" value="Player" maxlength="12" autocomplete="off">
    <button id="startBtn" class="actionBtn" onclick="startMatching(false)">Game Start</button>
</div>

<div id="ui">
    <div id="timerBox">TIME: <span id="timeText">60</span>s</div>
    <div id="leaderboard"></div>
    <div id="controlsText">PC: 방향키 / WASD<br>모바일: 터치(드래그)</div>
</div>

<div id="gameOverScreen">
    <div id="gameOverTitle">GAME OVER</div>
    <div id="finalRank">당신의 순위: -</div>
    <button id="restartBtn" class="actionBtn" onclick="startMatching(window.lastGameWon)">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, clock;
    let ground;
    let eatableObjects = [];
    let holes = [];
    let idSprites = []; 
    
    const fakeNames = [
        "ShadowNinja", "ProGamer_007", "NoobSlayer", "KittyCat", "DarkLord", "Xx_Snipe_xX", 
        "HoleMaster", "GigaChad", "LunarEclipse", "StarWalker", "ToxicPlayer", "Chewuup", 
        "SpeedyBoi", "SaltyTears", "KingKong오후 5:28 2026-04-10", "FakerFan", "JustA_Hole", "VoidWalker", 
        "EaterOfWorlds", "YummyCity", "GamerGirl99", "I_Eat_You", "BlackHoleSun", "Devourer", 
        "MrT-Rex", "Omnomnom", "SweatyTryhard", "PizzaLover", "uwu_Hole", "Terminator", 
        "JohnDoe", "Player_8472", "Bot_or_Not", "idunnou", "GravityKing", "NomNomNom", 
        "Anonymous", "Guest1337", "aaaaaa", "I_Win_You_Lose", "EasyGame", "TryHarder", 
        "PeppaPig", "IronMan", "HulkSmash", "Pikachu", "SuperMario", "Batman"
    ];

    let keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    let usingKeyboard = true; 
    let usingTouch = false;
    let touchTargetX = 0, touchTargetZ = 0;
    
    const baseSpeed = 15.0; 
    const worldSize = 80;
    
    let isPlaying = false;
    let isGameOver = false;
    let timeLeft = 60;
    let timerInterval, respawnInterval;
    let internalStage = 1; 
    window.lastGameWon = false; 
    window.playerName = "Player"; 

    // --- 난이도 제어 함수 ---
    function getDifficulty(stage) {
        // 인덱스 0이 스테이지 1에 해당
        const pattern = ["Normal", "Normal", "Hard", "Normal", "Normal", "Hard", "Normal", "Hard", "Normal", "Hard", "Normal"];
        if (stage <= pattern.length) {
            return pattern[stage - 1];
        }
        return "Hard"; // 12 스테이지 이후로는 무조건 Hard
    }

    function createIdSprite(name, colorStr) {
        let canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 64;
        let ctx = canvas.getContext('2d');
        ctx.font = 'Bold 44px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillText(name, 153, 35);
        ctx.fillStyle = colorStr; ctx.fillText(name, 150, 32);
        
        let texture = new THREE.CanvasTexture(canvas);
        let spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false, depthTest: false, renderOrder: 9 });
        let sprite = new THREE.Sprite(spriteMat);
        return sprite;
    }

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 

        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 20); 
        camera.lookAt(0, 0, 0);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(30, 50, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        window.addEventListener('keydown', (e) => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) { keys[k] = true; usingKeyboard = true; usingTouch = false; } 
            else if(keys.hasOwnProperty(e.key)) { keys[e.key] = true; usingKeyboard = true; usingTouch = false; }
        });
        window.addEventListener('keyup', (e) => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = false; 
            else if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        const updateTouch = (clientX, clientY) => {
            usingKeyboard = false; usingTouch = true;
            let mx = (clientX / window.innerWidth) * 2 - 1;
            let my = -(clientY / window.innerHeight) * 2 + 1;
            touchTargetX = mx * worldSize * 0.9;
            touchTargetZ = -my * worldSize * 0.9;
        };
        
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) updateTouch(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) updateTouch(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', () => { usingTouch = false; });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    }

    function startMatching(didWinPrevious) {
        if (didWinPrevious) internalStage++; 

        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('ui').style.display = 'none';
        
        const menuScreen = document.getElementById('mainMenuScreen');
        menuScreen.style.display = 'flex';
        
        const startBtn = document.getElementById('startBtn');
        const nameInput = document.getElementById('playerNameInput');
        
        let pName = nameInput.value.trim();
        window.playerName = pName === "" ? "Player" : pName;
        
        startBtn.disabled = true;
        nameInput.disabled = true;
        
        let dots = 0;
        let matchInterval = setInterval(() => {
            dots = (dots + 1) % 4;
            startBtn.innerText = "Matching" + ".".repeat(dots);
        }, 400);

        let fakeWaitTime = 1500 + Math.random() * 1000;

        setTimeout(() => {
            clearInterval(matchInterval);
            startBtn.disabled = false;
            nameInput.disabled = false;
            startBtn.innerText = "Game Start";
            menuScreen.style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            
            resetGame(internalStage); 
        }, fakeWaitTime);
    }
    
    window.startMatching = startMatching;

    function clearScene() {
        eatableObjects.forEach(obj => {
            scene.remove(obj); obj.geometry.dispose();
            if(Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
        });
        eatableObjects = [];
        
        idSprites.forEach(s => { scene.remove(s); s.material.map.dispose(); s.material.dispose(); });
        idSprites = [];
        
        holes.forEach(h => {
            scene.remove(h.mask); h.mask.geometry.dispose(); h.mask.material.dispose();
            scene.remove(h.tunnel); h.tunnel.geometry.dispose(); h.tunnel.material.dispose();
            scene.remove(h.ring); h.ring.geometry.dispose(); h.ring.material.dispose();
        });
        holes = [];

        if(ground) { scene.remove(ground); ground.geometry.dispose(); ground.material.dispose(); }
    }

    function spawnSingleObject() {
        const colors = [0xff6b6b, 0x1dd1a1, 0xfeca57, 0x48dbfb, 0x9b59b6];
        let x, z, type;
        let isBiased = false;
        
        let diff = getDifficulty(internalStage);

        // 보통 난이도일 때만 유저 혜택(중앙 스폰) 15% 제공
        if (diff === "Normal" && Math.random() < 0.15) {
            isBiased = true;
        }

        if (isBiased) {
            let angle = Math.random() * Math.PI * 2;
            let r = 10 + Math.random() * 35; 
            x = Math.cos(angle) * r; z = Math.sin(angle) * r;
            type = 0.8 + Math.random() * 0.2; 
        } else {
            x = (Math.random()-0.5) * worldSize * 1.8;
            z = (Math.random()-0.5) * worldSize * 1.8;
            if (Math.abs(x) < 5 && Math.abs(z) < 5) { x += (x > 0 ? 5 : -5); } 
            type = Math.random();
        }

        let mesh, radius;
        const mat = new THREE.MeshStandardMaterial({color: colors[Math.floor(Math.random()*colors.length)]});
        
        if(type < 0.15) { 
            const h = 8 + Math.random() * 6; mesh = new THREE.Mesh(new THREE.BoxGeometry(5, h, 5), mat); mesh.position.set(x, h/2, z); radius = 4.0;
        } else if(type < 0.4) { 
            const h = 6 + Math.random() * 6; mesh = new THREE.Mesh(new THREE.BoxGeometry(3, h, 3), mat); mesh.position.set(x, h/2, z); radius = 3.0;
        } else if (type < 0.7) { 
            const h = 3 + Math.random() * 3; mesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, h, 2.5), mat); mesh.position.set(x, h/2, z); radius = 2.0;
        } else { 
            mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.0, 1.2), new THREE.MeshStandardMaterial({color: 0xdddddd})); mesh.position.set(x, 0.5, z); radius = 1.3;
        }
        
        mesh.castShadow = true; mesh.renderOrder = 4;
        mesh.userData = { radius, isFalling: false, fallingInto: null, velY: 0, tumbleX: 0, tumbleZ: 0 };
        eatableObjects.push(mesh); scene.add(mesh);
    }

    function createCity() {
        let objectCount = Math.min(200 + (internalStage * 5), 300);
        for(let i=0; i<objectCount; i++) spawnSingleObject();
    }

    function resetGame(stage) {
        internalStage = stage;
        isPlaying = true;
        isGameOver = false;
        timeLeft = 60;
        usingKeyboard = true; 
        usingTouch = false;
        window.lastGameWon = false;

	// 👇 여기에 GA4 게임 시작 신호를 추가하세요! 👇
        window.parent.postMessage({ type: 'GAME_ACTUAL_START' }, '*');

        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('timeText').innerText = timeLeft;

        clearScene();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d3d3d, roughness: 0.8 });
        groundMat.stencilWrite = true; groundMat.stencilFunc = THREE.NotEqualStencilFunc; groundMat.stencilRef = 1;
        ground = new THREE.Mesh(new THREE.PlaneGeometry(worldSize * 2, worldSize * 2), groundMat);
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; ground.renderOrder = 2; 
        scene.add(ground);

        createCity();

        createHole(true, window.playerName, 0x3498db, 0, 0);

        let shuffledNames = [...fakeNames].sort(() => 0.5 - Math.random());
        createHole(false, shuffledNames[0], 0xe74c3c, 25, 25);
        createHole(false, shuffledNames[1], 0x2ecc71, -25, 25);
        createHole(false, shuffledNames[2], 0xf1c40f, 25, -25);
        createHole(false, shuffledNames[3], 0x9b59b6, -25, -25);

        camera.position.set(0, 25, 20); 
        camera.lookAt(0, 0, 0);

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!isPlaying || isGameOver) return;
            timeLeft--;
            document.getElementById('timeText').innerText = timeLeft;
            if(timeLeft <= 0) endGame("TIME UP!", false);
        }, 1000);

        if(respawnInterval) clearInterval(respawnInterval);
        respawnInterval = setInterval(() => {
            if(!isPlaying || isGameOver) return;
            let activeCount = eatableObjects.filter(o => !o.userData.isFalling).length;
            let maxCount = Math.min(200 + (internalStage * 5), 300);
            if (activeCount < maxCount * 0.6) {
                for(let i=0; i<3; i++) spawnSingleObject();
            }
        }, 8000);
    }

    function createHole(isPlayer, name, colorHex, startX, startZ) {
        let radius = 1.5;
        const maskMat = new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: false });
        maskMat.stencilWrite = true; maskMat.stencilFunc = THREE.AlwaysStencilFunc;
        maskMat.stencilZPass = THREE.ReplaceStencilOp; maskMat.stencilRef = 1;
        const mask = new THREE.Mesh(new THREE.CircleGeometry(1, 64), maskMat);
        mask.rotation.x = -Math.PI / 2; mask.position.set(startX, 0.01, startZ);
        mask.renderOrder = 1; scene.add(mask);

        const tunnelMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.BackSide, roughness: 1.0 });
        tunnelMat.stencilWrite = true; tunnelMat.stencilFunc = THREE.EqualStencilFunc; tunnelMat.stencilRef = 1;
        const tunnel = new THREE.Mesh(new THREE.CylinderGeometry(1, 0.7, 100, 32, 1, true), tunnelMat);
        tunnel.position.set(startX, -50, startZ); tunnel.renderOrder = 3; scene.add(tunnel);

        const ring = new THREE.Mesh(new THREE.TorusGeometry(1, 0.08, 16, 64), new THREE.MeshBasicMaterial({ color: colorHex }));
        ring.rotation.x = -Math.PI / 2; ring.position.set(startX, 0.05, startZ);
        scene.add(ring);

        const idSprite = createIdSprite(name, '#' + colorHex.toString(16).padStart(6, '0'));
        idSprites.push(idSprite);
        scene.add(idSprite);

        let diff = getDifficulty(internalStage);
        // 어려움 모드에서는 40%, 보통 모드에서는 15%의 공격적(트롤) 성향 AI 생성
        let aggroChance = (diff === "Hard") ? 0.4 : 0.15;
        const isAggressive = !isPlayer && (Math.random() < aggroChance);

        const holeObj = {
            isPlayer: isPlayer, name: name, color: colorHex, radius: radius,
            x: startX, z: startZ, targetX: startX, targetZ: startZ,
            mask: mask, tunnel: tunnel, ring: ring, idSprite: idSprite,
            isAggressive: isAggressive, 
            currentTarget: null, currentTargetType: null, isWandering: false, isDead: false
        };
        updateHoleVisuals(holeObj); holes.push(holeObj);
    }

    function updateHoleVisuals(hole) {
        hole.mask.scale.set(hole.radius, hole.radius, 1);
        hole.tunnel.scale.set(hole.radius, 1, hole.radius);
        hole.ring.scale.set(hole.radius, hole.radius, 1);
        
        // 닉네임 스케일링 & 카메라 시점 오프셋 적용
        const nameScale = 1 + Math.max(0, (hole.radius - 1.5)) * 0.5;
        hole.idSprite.scale.set(6 * nameScale, 1.28 * nameScale, 1);

        const zOffset = hole.isPlayer ? (hole.radius + 2.5) : (hole.radius + 1.2);
        const yHeight = 2.0 + (hole.radius * 0.2);

        hole.idSprite.position.set(hole.x, yHeight, hole.z - zOffset);
    }

    function killHole(victim, predator) {
        victim.isDead = true;
        scene.remove(victim.mask); scene.remove(victim.tunnel); scene.remove(victim.ring); scene.remove(victim.idSprite); 
        predator.radius += victim.radius * 0.8; 
        updateHoleVisuals(predator);
        if (victim.isPlayer) endGame("EATEN BY " + predator.name, true);
    }

    function updateLeaderboard() {
        let sortedHoles = [...holes].filter(h => !h.isDead).sort((a, b) => b.radius - a.radius);
        let html = '';
        sortedHoles.forEach((h, index) => {
            let colorStr = '#' + h.color.toString(16).padStart(6, '0');
            html += `<div class="rank-item" style="color: ${h.isPlayer ? '#fff' : '#aaa'}">
                        <span><span class="rank-color" style="background:${colorStr}"></span>${index+1}. ${h.name}</span>
                        <span>${(h.radius * 10).toFixed(0)}</span>
                     </div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
        return sortedHoles;
    }

    function endGame(title, isEaten) {
        if(isGameOver) return;
        isPlaying = false;
        isGameOver = true;
        clearInterval(timerInterval); clearInterval(respawnInterval);
        
        let sorted = updateLeaderboard();
        let myRank = sorted.findIndex(h => h.isPlayer) + 1;
        let rankText = myRank > 0 ? `${myRank}위` : "사망 (먹힘)";

        let isWin = (!isEaten && myRank === 1);
        window.lastGameWon = isWin; 

	// 👇 여기에 GA4 점수 전송 신호를 추가하세요! 👇
        let playerHole = holes.find(h => h.isPlayer);
        let finalScore = playerHole ? Math.floor(playerHole.radius * 10) : 0;
        window.parent.postMessage({ type: isWin ? 'GAME_CLEAR' : 'GAME_OVER', score: finalScore }, '*');
        // 👆 여기까지 추가 👆

        const titleEl = document.getElementById('gameOverTitle');
        
        if (isWin) {
            titleEl.innerText = "VICTORY!"; titleEl.style.color = "#1dd1a1";
        } else {
            titleEl.innerText = isEaten ? title : "GAME OVER"; titleEl.style.color = "#ff6b6b";
        }

        document.getElementById('finalRank').innerText = `최종 순위: ${rankText}`;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);
        
        if (!isPlaying || isGameOver) {
            renderer.render(scene, camera);
            return;
        }

        const fpsMultiplier = dt * 60; 

        let aliveHolesCount = holes.filter(h => !h.isDead).length;
        if (aliveHolesCount === 1 && holes.find(h => h.isPlayer && !h.isDead)) {
            endGame("SURVIVOR!", false); return;
        }

        // 난이도 패턴 적용
        let diff = getDifficulty(internalStage);
        let aiSpeedMult = (diff === "Normal") ? 0.85 : 1.0;
        let aiVision = (diff === "Normal") ? 45 : 120;
        let huntHoles = (diff === "Hard"); // 어려움 모드에선 AI가 유저를 사냥하려 함

        let playerHole = holes.find(h => h.isPlayer);

        holes.forEach(hole => {
            if (hole.isDead) return;

            let currentSpeed = baseSpeed + Math.max(0, (hole.radius - 1.5)) * 1.5;

            if (hole.isPlayer) {
                let moveX = 0, moveZ = 0;
                if (usingKeyboard) {
                    if(keys.w || keys.ArrowUp) moveZ = -1; if(keys.s || keys.ArrowDown) moveZ = 1;
                    if(keys.a || keys.ArrowLeft) moveX = -1; if(keys.d || keys.ArrowRight) moveX = 1;
                } 
                else if (usingTouch) {
                    let dx = touchTargetX - hole.x; let dz = touchTargetZ - hole.z;
                    let dist = Math.sqrt(dx*dx + dz*dz); if (dist > 0.5) { moveX = dx / dist; moveZ = dz / dist; }
                }

                if (moveX !== 0 || moveZ !== 0) {
                    let mag = Math.sqrt(moveX*moveX + moveZ*moveZ);
                    hole.x += (moveX / mag) * currentSpeed * dt; hole.z += (moveZ / mag) * currentSpeed * dt;
                }
                
                hole.x = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.x));
                hole.z = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.z));

                camera.position.x += (hole.x - camera.position.x) * 0.08 * fpsMultiplier;
                camera.position.z += (hole.z + 18 + hole.radius*1.8 - camera.position.z) * 0.08 * fpsMultiplier;
                camera.position.y += (22 + hole.radius*2.5 - camera.position.y) * 0.08 * fpsMultiplier; 
                camera.lookAt(hole.x, 0, hole.z);
                
            } else {
                let needsNewTarget = false;
                let aggroEngaged = false; 
                
                if (hole.isAggressive && playerHole && !playerHole.isDead) {
                    let distToPlayer = Math.sqrt((playerHole.x - hole.x)**2 + (playerHole.z - hole.z)**2);
                    if (distToPlayer < 30 && playerHole.radius < hole.radius * 1.15) { 
                        hole.currentTarget = playerHole; hole.currentTargetType = 'hole';
                        hole.isWandering = false; aggroEngaged = true;
                    }
                }

                if (!aggroEngaged) {
                    if (!hole.currentTarget) needsNewTarget = true;
                    else if (hole.currentTargetType === 'food') {
                        const targetExists = eatableObjects.find(obj => obj === hole.currentTarget);
                        if (!targetExists || hole.currentTarget.userData.isFalling) needsNewTarget = true;
                    } else if (hole.currentTargetType === 'hole') {
                        if (hole.currentTarget.isDead || hole.radius <= hole.currentTarget.radius * 1.1) needsNewTarget = true;
                    }

                    if (needsNewTarget && !hole.isWandering) {
                        let closest = null, minDist = Infinity, cType = null;
                        
                        if (huntHoles) {
                            holes.forEach(other => {
                                if (!other.isDead && other !== hole && hole.radius > other.radius * 1.15) {
                                    let d = Math.sqrt((other.x - hole.x)**2 + (other.z - hole.z)**2);
                                    if (d < minDist && d < aiVision) { minDist = d; closest = other; cType = 'hole'; }
                                }
                            });
                        }
                        
                        if (!closest) {
                            for (let obj of eatableObjects) {
                                if (!obj.userData.isFalling && obj.userData.radius < hole.radius * 0.9) {
                                    let dist = Math.sqrt(Math.pow(obj.position.x - hole.x, 2) + Math.pow(obj.position.z - hole.z, 2));
                                    if (dist < minDist && dist < aiVision) { minDist = dist; closest = obj; cType = 'food'; }
                                }
                            }
                        }

                        if (closest) { hole.currentTarget = closest; hole.currentTargetType = cType; hole.isWandering = false; } 
                        else {
                            hole.targetX = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.x + (Math.random() - 0.5) * 50));
                            hole.targetZ = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.z + (Math.random() - 0.5) * 50));
                            hole.isWandering = true; hole.currentTarget = null;
                        }
                    }
                }

                if (hole.isWandering) {
                    let wd = Math.sqrt((hole.targetX - hole.x)**2 + (hole.targetZ - hole.z)**2);
                    if (wd < 2.0) hole.isWandering = false;
                } else if (hole.currentTarget) {
                    if (hole.currentTargetType === 'food') {
                        hole.targetX = hole.currentTarget.position.x; hole.targetZ = hole.currentTarget.position.z;
                    } else { hole.targetX = hole.currentTarget.x; hole.targetZ = hole.currentTarget.z; }
                }

                hole.targetX = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.targetX));
                hole.targetZ = Math.max(-worldSize*0.9, Math.min(worldSize*0.9, hole.targetZ));

                let dx = hole.targetX - hole.x; let dz = hole.targetZ - hole.z;
                let dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist > 0.5) {
                    hole.x += (dx / dist) * (currentSpeed * aiSpeedMult) * dt;
                    hole.z += (dz / dist) * (currentSpeed * aiSpeedMult) * dt;
                }
            }
        });

        for (let i = 0; i < holes.length; i++) {
            for (let j = i + 1; j < holes.length; j++) {
                if (holes[i].isDead || holes[j].isDead) continue;
                let h1 = holes[i], h2 = holes[j];
                
                let dx = h1.x - h2.x, dz = h1.z - h2.z;
                let dist = Math.sqrt(dx*dx + dz*dz);
                let touchDist = h1.radius + h2.radius;
                
                if (dist < touchDist * 0.9) {
                    if (h1.radius > h2.radius * 1.1) killHole(h2, h1);
                    else if (h2.radius > h1.radius * 1.1) killHole(h1, h2);
                    else {
                        let overlap = touchDist * 0.9 - dist;
                        if (dist > 0.1) {
                            let pushX = (dx / dist) * overlap * 0.2 * fpsMultiplier;
                            let pushZ = (dz / dist) * overlap * 0.2 * fpsMultiplier;
                            h1.x += pushX; h1.z += pushZ; h2.x -= pushX; h2.z -= pushZ;
                        }
                    }
                }
            }
        }

        holes.forEach(hole => {
            if(!hole.isDead) {
                hole.mask.position.set(hole.x, 0.01, hole.z);
                hole.tunnel.position.set(hole.x, -50, hole.z);
                hole.ring.position.set(hole.x, 0.05, hole.z);
                // 닉네임 오프셋 (스케일 반영)
                const zOffset = hole.isPlayer ? (hole.radius + 2.5) : (hole.radius + 1.2);
                const yHeight = 2.0 + (hole.radius * 0.2);
                hole.idSprite.position.set(hole.x, yHeight, hole.z - zOffset);
            }
        });

        for (let i = eatableObjects.length - 1; i >= 0; i--) {
            const obj = eatableObjects[i];

            if (!obj.userData.isFalling) {
                for (let hole of holes) {
                    if (hole.isDead) continue;
                    let dist = Math.sqrt(Math.pow(obj.position.x - hole.x, 2) + Math.pow(obj.position.z - hole.z, 2));
                    
                    if (dist < hole.radius * 0.7 && obj.userData.radius < hole.radius * 0.9) {
                        obj.userData.isFalling = true; obj.userData.fallingInto = hole; 
                        obj.userData.tumbleX = (Math.random() - 0.5) * 2;
                        obj.userData.tumbleZ = (Math.random() - 0.5) * 2;
                        break;
                    }
                }
            } else {
                let targetHole = obj.userData.fallingInto;
                let hX = targetHole && !targetHole.isDead ? targetHole.x : obj.position.x;
                let hZ = targetHole && !targetHole.isDead ? targetHole.z : obj.position.z;

                obj.userData.velY -= 30 * dt; obj.position.y += obj.userData.velY * dt;
                obj.position.x += (hX - obj.position.x) * 0.08 * fpsMultiplier;
                obj.position.z += (hZ - obj.position.z) * 0.08 * fpsMultiplier;
                
                obj.rotation.x += obj.userData.tumbleX * dt; obj.rotation.z += obj.userData.tumbleZ * dt;
                obj.scale.multiplyScalar(Math.max(0.1, 1.0 - 0.8 * dt)); 

                if (obj.position.y < -60) {
                    if (targetHole && !targetHole.isDead) {
                        targetHole.radius += obj.userData.radius * 0.08;
                        updateHoleVisuals(targetHole);
                    }
                    holes.forEach(aiHole => {
                        if (aiHole.currentTarget === obj) {
                            aiHole.currentTarget = null; aiHole.currentTargetType = null; aiHole.isWandering = false;
                        }
                    });
                    scene.remove(obj); eatableObjects.splice(i, 1); 
                }
            }
        }

        if(clock.getElapsedTime() % 0.5 < 0.1) updateLeaderboard();
        
        renderer.render(scene, camera);
    }

    init(); 
</script>
